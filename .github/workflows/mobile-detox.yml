name: "Reusable: Mobile Detox E2E"

on:
  workflow_call:
    inputs:
      working-directory:
        required: false
        type: string
        default: "."
        description: "Project directory"
      system-name:
        required: true
        type: string
        description: "System name for display"
      node-version:
        required: false
        type: number
        default: 20
        description: "Node.js version"
      java-version:
        required: false
        type: string
        default: "17"
        description: "JDK version"
      detox-build-command:
        required: false
        type: string
        default: "npx detox build -c android.emu.debug"
        description: "Command used to produce the Android app binary for Detox"
      detox-test-command:
        required: false
        type: string
        default: "npx detox test -c android.emu.debug --headless"
        description: "Command used to execute Detox tests"
      skip-build:
        required: false
        type: boolean
        default: false
        description: "Skip the app build step and use a pre-built artifact instead"
      build-artifact-name:
        required: false
        type: string
        default: ""
        description: "GitHub artifact name containing pre-built Android Detox output (direct APK files)"

permissions:
  contents: read

jobs:
  detox-e2e:
    name: "Detox Android E2E"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: ./${{ inputs.working-directory }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Detect package manager
        id: detect-pm
        run: |
          if [ -f "yarn.lock" ]; then
            echo "pm=yarn" >> "$GITHUB_OUTPUT"
          elif [ -f "pnpm-lock.yaml" ]; then
            echo "pm=pnpm" >> "$GITHUB_OUTPUT"
          elif [ -f "package-lock.json" ] || [ -f "npm-shrinkwrap.json" ] || [ -f "package.json" ]; then
            echo "pm=npm" >> "$GITHUB_OUTPUT"
          else
            echo "❌ package.json is required for Detox runs."
            exit 1
          fi

      - name: Setup Node.js ${{ inputs.node-version }} (npm)
        if: ${{ steps.detect-pm.outputs.pm == 'npm' }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: "npm"
          cache-dependency-path: |
            **/package-lock.json

      - name: Setup Node.js ${{ inputs.node-version }} (yarn)
        if: ${{ steps.detect-pm.outputs.pm == 'yarn' }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: "yarn"
          cache-dependency-path: |
            **/yarn.lock

      - name: Setup Node.js ${{ inputs.node-version }} (pnpm)
        if: ${{ steps.detect-pm.outputs.pm == 'pnpm' }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: "pnpm"
          cache-dependency-path: |
            **/pnpm-lock.yaml

      - name: Install Dependencies
        env:
          PACKAGE_MANAGER: ${{ steps.detect-pm.outputs.pm }}
        run: |
          if [ "${PACKAGE_MANAGER}" = "yarn" ]; then
            corepack enable
            yarn install --frozen-lockfile
          elif [ "${PACKAGE_MANAGER}" = "pnpm" ]; then
            corepack enable
            pnpm install --frozen-lockfile
          else
            npm ci
          fi

      - name: Validate Detox installation
        run: |
          if ! node -e "require.resolve('detox/package.json')" >/dev/null 2>&1; then
            echo "❌ Detox is not installed in this repository."
            echo "Add detox as a local devDependency in the target mobile repo before enabling Detox CI."
            exit 1
          fi

          DETOX_JEST_ENTRYPOINT=""
          for specifier in \
            "detox/runners/jest/testEnvironment" \
            "detox/runners/jest" \
            "detox/runners/jest-circus/environment" \
            "detox/runners/jest-circus"
          do
            if node -e "require.resolve(process.argv[1])" "${specifier}" >/dev/null 2>&1; then
              DETOX_JEST_ENTRYPOINT="${specifier}"
              break
            fi
          done

          if [ -z "${DETOX_JEST_ENTRYPOINT}" ]; then
            echo "⚠️ Jest cannot resolve a known Detox runner entrypoint from this repository."
            echo "Continuing because the repo may use a custom Jest environment file that imports Detox indirectly."
            echo "If Detox tests fail later, verify the repo's Detox/Jest configuration against the installed Detox version."
          else
            echo "✅ Resolved Detox Jest entrypoint: ${DETOX_JEST_ENTRYPOINT}"
          fi

          DETOX_INIT_FILES=()
          while IFS= read -r -d '' f; do
            DETOX_INIT_FILES+=("$f")
          done < <(find . -type f \( -path '*/e2e/init.js' -o -path '*/e2e/init.ts' -o -path '*/tests/e2e/init.js' -o -path '*/tests/e2e/init.ts' \) -print0)
          if [ "${#DETOX_INIT_FILES[@]}" -gt 0 ]; then
            JASMINE_INIT_FILES=()
            while IFS= read -r f; do
              [ -n "$f" ] && JASMINE_INIT_FILES+=("$f")
            done < <(grep -l 'jasmine\.getEnv()\|jasmine\.getEnv(' "${DETOX_INIT_FILES[@]}" 2>/dev/null || true)
            if [ "${#JASMINE_INIT_FILES[@]}" -gt 0 ]; then
              echo "❌ Detected legacy Jasmine-based Detox init setup that is incompatible with the installed Jest/Detox runner."
              printf '   - %s\n' "${JASMINE_INIT_FILES[@]}"
              echo "Remove jasmine.getEnv() reporter wiring from the Detox init file and migrate the repo to the current Detox Jest setup."
              echo "Typical fix: replace legacy init code that calls jasmine.getEnv().addReporter(...) with the current Detox setup used by the repo's installed Detox version."
              echo "This usually means keeping Detox lifecycle hooks (beforeAll/afterAll/etc.) but dropping Jasmine globals entirely."
              exit 1
            fi
          fi

      - name: Download pre-built Android artifact
        if: ${{ inputs.skip-build && inputs.build-artifact-name != '' }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.build-artifact-name }}
          path: ${{ inputs.working-directory != '.' && format('{0}/{1}', github.workspace, inputs.working-directory) || github.workspace }}

      - name: Extract pre-built Android artifact
        if: ${{ inputs.skip-build && inputs.build-artifact-name != '' }}
        run: |
          EXPECTED_APK="android/app/build/outputs/apk/debug/app-debug.apk"
          EXPECTED_TEST_APK="android/app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk"

          if [ -f "${EXPECTED_APK}" ] && [ -f "${EXPECTED_TEST_APK}" ]; then
            echo "✅ Restored Android app APK and test APK from artifact."
            exit 0
          fi

          APK=$(find . -type f -name "app-debug.apk" | head -n 1)
          TEST_APK=$(find . -type f -name "*-androidTest.apk" | head -n 1)

          if [ -n "${APK}" ] && [ -n "${TEST_APK}" ]; then
            mkdir -p "$(dirname "${EXPECTED_APK}")"
            mkdir -p "$(dirname "${EXPECTED_TEST_APK}")"
            cp "${APK}" "${EXPECTED_APK}"
            cp "${TEST_APK}" "${EXPECTED_TEST_APK}"
            echo "✅ Placed APKs at ${EXPECTED_APK} and ${EXPECTED_TEST_APK}."
          else
            echo "❌ Required APKs were not found in downloaded artifact."
            exit 1
          fi

      - name: Normalize restored APK path
        if: ${{ inputs.skip-build && inputs.build-artifact-name != '' }}
        run: |
          EXPECTED_APK="android/app/build/outputs/apk/debug/app-debug.apk"
          EXPECTED_TEST_APK="android/app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk"

          if [ -f "${EXPECTED_APK}" ] && [ -f "${EXPECTED_TEST_APK}" ]; then
            echo "✅ Expected APKs exist: ${EXPECTED_APK} and ${EXPECTED_TEST_APK}"
            exit 0
          fi

          CANDIDATE=$(find android/app/build/outputs/apk -type f -name "app-debug.apk" | sort | head -n 1)
          TEST_CANDIDATE=$(find android/app/build/outputs/apk -type f \( -name "*-androidTest.apk" -o -path "*/androidTest/*/*.apk" \) | sort | head -n 1)

          if [ -n "${CANDIDATE}" ] && [ -n "${TEST_CANDIDATE}" ]; then
            mkdir -p "$(dirname "${EXPECTED_APK}")"
            mkdir -p "$(dirname "${EXPECTED_TEST_APK}")"
            cp "${CANDIDATE}" "${EXPECTED_APK}"
            cp "${TEST_CANDIDATE}" "${EXPECTED_TEST_APK}"
            echo "✅ Normalized APK paths for Detox."
          else
            echo "⚠️ App APK or test APK candidate was not found under android/app/build/outputs/apk"
          fi

      - name: Ensure Android Native Project
        if: ${{ !inputs.skip-build }}
        run: |
          if [ ! -d "android" ]; then
            CI=1 npx expo prebuild --platform android
          fi

      - name: Ensure Kotlin Version Fallback
        if: ${{ !inputs.skip-build }}
        run: |
          if [ -f "android/gradle.properties" ]; then
            if grep -q '^kotlinVersion=' android/gradle.properties; then
              CURRENT_VERSION=$(grep '^kotlinVersion=' android/gradle.properties | head -n 1 | cut -d'=' -f2-)
              echo "ℹ️ Preserving project kotlinVersion=${CURRENT_VERSION}"
            else
              echo 'kotlinVersion=2.0.21' >> android/gradle.properties
              echo "✅ Added fallback kotlinVersion=2.0.21"
            fi
          fi

      - name: Setup JDK ${{ inputs.java-version }}
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ inputs.java-version }}

      - name: Build Android app binary
        if: ${{ !inputs.skip-build }}
        run: ${{ inputs.detox-build-command }}

      - name: Ensure Android app binary exists
        run: |
          EXPECTED_APK="android/app/build/outputs/apk/debug/app-debug.apk"
          EXPECTED_TEST_APK="android/app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk"

          if [ -f "${EXPECTED_APK}" ] && [ -f "${EXPECTED_TEST_APK}" ]; then
            echo "✅ Found app APK and test APK at expected paths."
            exit 0
          fi

          echo "ℹ️ Expected Detox APKs missing; searching for generated APK candidates..."
          CANDIDATE=$(find android/app/build/outputs/apk -type f -name "app-debug.apk" | sort | head -n 1)
          TEST_CANDIDATE=$(find android/app/build/outputs/apk -type f \( -name "*-androidTest.apk" -o -path "*/androidTest/*/*.apk" \) | sort | head -n 1)

          if [ -n "${CANDIDATE}" ] && [ -n "${TEST_CANDIDATE}" ]; then
            mkdir -p "$(dirname "${EXPECTED_APK}")"
            mkdir -p "$(dirname "${EXPECTED_TEST_APK}")"
            cp "${CANDIDATE}" "${EXPECTED_APK}"
            cp "${TEST_CANDIDATE}" "${EXPECTED_TEST_APK}"
            echo "✅ Normalized APK paths for Detox."
            exit 0
          fi

          echo "ℹ️ APK candidates missing. Triggering fallback build command once..."
          ${{ inputs.detox-build-command }}

          if [ -f "${EXPECTED_APK}" ] && [ -f "${EXPECTED_TEST_APK}" ]; then
            echo "✅ Fallback build produced expected Detox APKs."
            exit 0
          fi

          CANDIDATE_AFTER=$(find android/app/build/outputs/apk -type f -name "app-debug.apk" | sort | head -n 1)
          TEST_CANDIDATE_AFTER=$(find android/app/build/outputs/apk -type f \( -name "*-androidTest.apk" -o -path "*/androidTest/*/*.apk" \) | sort | head -n 1)
          if [ -n "${CANDIDATE_AFTER}" ] && [ -n "${TEST_CANDIDATE_AFTER}" ]; then
            mkdir -p "$(dirname "${EXPECTED_APK}")"
            mkdir -p "$(dirname "${EXPECTED_TEST_APK}")"
            cp "${CANDIDATE_AFTER}" "${EXPECTED_APK}"
            cp "${TEST_CANDIDATE_AFTER}" "${EXPECTED_TEST_APK}"
            echo "✅ Normalized APK paths for Detox after fallback build."
            exit 0
          fi

          echo "❌ Unable to find or produce both app APK and test APK for Detox."
          if [ -d "android/app/build/outputs/apk" ]; then
            echo "📁 APK output tree:"
            find android/app/build/outputs/apk -maxdepth 4 -type f | sort
          else
            echo "📁 APK output directory does not exist: android/app/build/outputs/apk"
          fi
          exit 1

      - name: Run Detox tests on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          profile: pixel_5
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            cd ${{ inputs.working-directory }}

            echo "⏳ Waiting for Android emulator boot completion..."
            adb wait-for-device
            bash -lc 'RETRIES=0; MAX_RETRIES=120; until [ "$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d "\r")" = "1" ]; do RETRIES=$((RETRIES + 1)); if [ "$RETRIES" -ge "$MAX_RETRIES" ]; then echo "❌ Emulator did not report sys.boot_completed=1 after ${MAX_RETRIES}s"; adb shell getprop | head -40 || true; exit 1; fi; sleep 1; done'
            echo "✅ Emulator boot completed"

            echo "⏳ Waiting for Android PackageManager service..."
            bash -lc 'RETRIES=0; MAX_RETRIES=120; until adb shell service check package 2>&1 | grep -q "Service package:"; do RETRIES=$((RETRIES + 1)); if [ "$RETRIES" -ge "$MAX_RETRIES" ]; then echo "❌ PackageManager service did not become available after ${MAX_RETRIES}s"; adb shell service list 2>&1 | head -20 || true; exit 1; fi; sleep 1; done'
            echo "✅ PackageManager service is ready"

            echo "⏳ Validating PackageManager command path..."
            bash -lc 'RETRIES=0; MAX_RETRIES=60; until adb shell cmd package list packages >/dev/null 2>&1; do RETRIES=$((RETRIES + 1)); if [ "$RETRIES" -ge "$MAX_RETRIES" ]; then echo "❌ cmd package still unavailable after ${MAX_RETRIES}s"; adb shell service list 2>&1 | head -20 || true; exit 1; fi; sleep 1; done'
            echo "✅ cmd package is operational"

            adb shell settings put global window_animation_scale 0
            adb shell settings put global transition_animation_scale 0
            adb shell settings put global animator_duration_scale 0

            echo "▶️ Running Detox tests (attempt 1)..."
            set +e
            bash -lc "${{ inputs.detox-test-command }}" > detox-run.log 2>&1
            DETOX_STATUS=$?
            set -e
            cat detox-run.log

            if [ "${DETOX_STATUS}" -eq 0 ]; then
              exit 0
            fi

            if grep -q "Can't find service: package" detox-run.log; then
              echo "⚠️ Detox failed due to transient PackageManager service outage. Retrying once..."
              adb wait-for-device
              bash -lc 'RETRIES=0; MAX_RETRIES=90; until adb shell service check package 2>&1 | grep -q "Service package:"; do RETRIES=$((RETRIES + 1)); if [ "$RETRIES" -ge "$MAX_RETRIES" ]; then echo "❌ PackageManager service did not recover after ${MAX_RETRIES}s"; adb shell service list 2>&1 | head -20 || true; exit 1; fi; sleep 1; done'
              bash -lc 'adb shell cmd package list packages >/dev/null 2>&1 || true'

              echo "▶️ Running Detox tests (attempt 2)..."
              bash -lc "${{ inputs.detox-test-command }}"
              exit $?
            fi

            exit "${DETOX_STATUS}"
