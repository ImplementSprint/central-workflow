name: "Reusable: Mobile Detox E2E"

on:
  workflow_call:
    inputs:
      working-directory:
        required: false
        type: string
        default: "."
        description: "Project directory"
      system-name:
        required: true
        type: string
        description: "System name for display"
      node-version:
        required: false
        type: number
        default: 20
        description: "Node.js version"
      java-version:
        required: false
        type: string
        default: "17"
        description: "JDK version"
      detox-build-command:
        required: false
        type: string
        default: "npx detox build --configuration android.emu.debug"
        description: "Command used to produce the Android app binary for Detox"
      detox-test-command:
        required: false
        type: string
        default: "npx detox test --configuration android.emu.debug --headless"
        description: "Command used to execute Detox tests"
      skip-build:
        required: false
        type: boolean
        default: false
        description: "Skip the app build step and use a pre-built artifact instead"
      build-artifact-name:
        required: false
        type: string
        default: ""
        description: "GitHub artifact name containing pre-built Android Detox output (tar.gz)"

permissions:
  contents: read

jobs:
  detox-e2e:
    name: "Detox Android E2E"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: ./${{ inputs.working-directory }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Detect package manager
        id: detect-pm
        run: |
          if [ -f "yarn.lock" ]; then
            echo "pm=yarn" >> "$GITHUB_OUTPUT"
          elif [ -f "pnpm-lock.yaml" ]; then
            echo "pm=pnpm" >> "$GITHUB_OUTPUT"
          elif [ -f "package-lock.json" ] || [ -f "npm-shrinkwrap.json" ] || [ -f "package.json" ]; then
            echo "pm=npm" >> "$GITHUB_OUTPUT"
          else
            echo "❌ package.json is required for Detox runs."
            exit 1
          fi

      - name: Setup Node.js ${{ inputs.node-version }} (npm)
        if: ${{ steps.detect-pm.outputs.pm == 'npm' }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: "npm"
          cache-dependency-path: |
            **/package-lock.json

      - name: Setup Node.js ${{ inputs.node-version }} (yarn)
        if: ${{ steps.detect-pm.outputs.pm == 'yarn' }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: "yarn"
          cache-dependency-path: |
            **/yarn.lock

      - name: Setup Node.js ${{ inputs.node-version }} (pnpm)
        if: ${{ steps.detect-pm.outputs.pm == 'pnpm' }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: "pnpm"
          cache-dependency-path: |
            **/pnpm-lock.yaml

      - name: Install Dependencies
        env:
          PACKAGE_MANAGER: ${{ steps.detect-pm.outputs.pm }}
        run: |
          if [ "${PACKAGE_MANAGER}" = "yarn" ]; then
            corepack enable
            yarn install --frozen-lockfile --ignore-scripts
          elif [ "${PACKAGE_MANAGER}" = "pnpm" ]; then
            corepack enable
            pnpm install --frozen-lockfile --ignore-scripts
          else
            npm ci --ignore-scripts
          fi

      - name: Run postinstall hooks
        run: npm run postinstall --if-present

      - name: Validate Detox installation
        run: |
          if ! node -e "require.resolve('detox/package.json')" >/dev/null 2>&1; then
            echo "❌ Detox is not installed in this repository."
            echo "Add detox as a local devDependency in the target mobile repo before enabling Detox CI."
            exit 1
          fi

          DETOX_JEST_ENTRYPOINT=""
          for specifier in \
            "detox/runners/jest/testEnvironment" \
            "detox/runners/jest" \
            "detox/runners/jest-circus/environment" \
            "detox/runners/jest-circus"
          do
            if node -e "require.resolve(process.argv[1])" "${specifier}" >/dev/null 2>&1; then
              DETOX_JEST_ENTRYPOINT="${specifier}"
              break
            fi
          done

          if [ -z "${DETOX_JEST_ENTRYPOINT}" ]; then
            echo "⚠️ Jest cannot resolve a known Detox runner entrypoint from this repository."
            echo "Continuing because the repo may use a custom Jest environment file that imports Detox indirectly."
            echo "If Detox tests fail later, verify the repo's Detox/Jest configuration against the installed Detox version."
          else
            echo "✅ Resolved Detox Jest entrypoint: ${DETOX_JEST_ENTRYPOINT}"
          fi

          mapfile -t DETOX_INIT_FILES < <(find . -type f \( -path '*/e2e/init.js' -o -path '*/e2e/init.ts' -o -path '*/tests/e2e/init.js' -o -path '*/tests/e2e/init.ts' \))
          if [ "${#DETOX_INIT_FILES[@]}" -gt 0 ]; then
            mapfile -t JASMINE_INIT_FILES < <(grep -l 'jasmine\.getEnv()\|jasmine\.getEnv(' "${DETOX_INIT_FILES[@]}" || true)
            if [ "${#JASMINE_INIT_FILES[@]}" -gt 0 ]; then
              echo "❌ Detected legacy Jasmine-based Detox init setup that is incompatible with the installed Jest/Detox runner."
              printf '   - %s\n' "${JASMINE_INIT_FILES[@]}"
              echo "Remove jasmine.getEnv() reporter wiring from the Detox init file and migrate the repo to the current Detox Jest setup."
              echo "Typical fix: replace legacy init code that calls jasmine.getEnv().addReporter(...) with the current Detox setup used by the repo's installed Detox version."
              echo "This usually means keeping Detox lifecycle hooks (beforeAll/afterAll/etc.) but dropping Jasmine globals entirely."
              exit 1
            fi
          fi

      - name: Download pre-built Android artifact
        if: ${{ inputs.skip-build && inputs.build-artifact-name != '' }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.build-artifact-name }}
          path: ${{ inputs.working-directory != '.' && format('{0}/{1}', github.workspace, inputs.working-directory) || github.workspace }}

      - name: Extract pre-built Android artifact
        if: ${{ inputs.skip-build && inputs.build-artifact-name != '' }}
        run: |
          tar xzf detox-android-build.tar.gz
          rm -f detox-android-build.tar.gz
          echo "✅ Extracted pre-built Android artifact."

      - name: Normalize restored APK path
        if: ${{ inputs.skip-build && inputs.build-artifact-name != '' }}
        run: |
          EXPECTED_APK="android/app/build/outputs/apk/debug/app-debug.apk"

          if [ -f "${EXPECTED_APK}" ]; then
            echo "✅ Expected APK exists: ${EXPECTED_APK}"
            exit 0
          fi

          CANDIDATE=$(find android/app/build/outputs/apk -type f -name "*.apk" \
            | awk '
              function score(path, s, lower) {
                s = 0
                lower = tolower(path)
                if (lower ~ /\/app\/build\/outputs\/apk\/debug\/app-debug\.apk$/) s += 10000
                if (lower ~ /\/debug\//) s += 1000
                if (lower ~ /x86_64/) s += 500
                if (lower ~ /universal/) s += 300
                if (lower ~ /androidtest/) s -= 5000
                if (lower ~ /release/) s -= 2000
                if (lower ~ /unsigned/) s -= 500
                return s
              }
              { print score($0) "\t" $0 }
            ' | sort -nr | head -n 1 | cut -f2-)

          if [ -n "${CANDIDATE}" ]; then
            mkdir -p "$(dirname "${EXPECTED_APK}")"
            cp "${CANDIDATE}" "${EXPECTED_APK}"
            echo "✅ Normalized APK path: ${CANDIDATE} -> ${EXPECTED_APK}"
          else
            echo "⚠️ No APK candidate found under android/app/build/outputs/apk"
          fi

      - name: Ensure Android Native Project
        if: ${{ !inputs.skip-build }}
        run: |
          if [ ! -d "android" ]; then
            CI=1 npx expo prebuild --platform android
          fi

      - name: Ensure Kotlin Version Fallback
        if: ${{ !inputs.skip-build }}
        run: |
          if [ -f "android/gradle.properties" ]; then
            if grep -q '^kotlinVersion=' android/gradle.properties; then
              CURRENT_VERSION=$(grep '^kotlinVersion=' android/gradle.properties | head -n 1 | cut -d'=' -f2-)
              echo "ℹ️ Preserving project kotlinVersion=${CURRENT_VERSION}"
            else
              echo 'kotlinVersion=2.0.21' >> android/gradle.properties
              echo "✅ Added fallback kotlinVersion=2.0.21"
            fi
          fi

      - name: Setup JDK ${{ inputs.java-version }}
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ inputs.java-version }}

      - name: Build Android app binary
        if: ${{ !inputs.skip-build }}
        run: ${{ inputs.detox-build-command }}

      - name: Ensure Android app binary exists
        run: |
          EXPECTED_APK="android/app/build/outputs/apk/debug/app-debug.apk"

          if [ -f "${EXPECTED_APK}" ]; then
            echo "✅ Found APK at expected path: ${EXPECTED_APK}"
            exit 0
          fi

          echo "ℹ️ Expected APK missing; searching for any generated APK candidate..."
          CANDIDATE=$(find android/app/build/outputs/apk -type f -name "*.apk" \
            | awk '
              function score(path, s, lower) {
                s = 0
                lower = tolower(path)
                if (lower ~ /\/app\/build\/outputs\/apk\/debug\/app-debug\.apk$/) s += 10000
                if (lower ~ /\/debug\//) s += 1000
                if (lower ~ /x86_64/) s += 500
                if (lower ~ /universal/) s += 300
                if (lower ~ /androidtest/) s -= 5000
                if (lower ~ /release/) s -= 2000
                if (lower ~ /unsigned/) s -= 500
                return s
              }
              { print score($0) "\t" $0 }
            ' | sort -nr | head -n 1 | cut -f2-)

          if [ -n "${CANDIDATE}" ]; then
            mkdir -p "$(dirname "${EXPECTED_APK}")"
            cp "${CANDIDATE}" "${EXPECTED_APK}"
            echo "✅ Normalized APK path: ${CANDIDATE} -> ${EXPECTED_APK}"
            exit 0
          fi

          echo "ℹ️ No APK candidate found. Triggering fallback build command once..."
          ${{ inputs.detox-build-command }}

          if [ -f "${EXPECTED_APK}" ]; then
            echo "✅ Fallback build produced expected APK: ${EXPECTED_APK}"
            exit 0
          fi

          CANDIDATE_AFTER=$(find android/app/build/outputs/apk -type f -name "*.apk" \
            | awk '
              function score(path, s, lower) {
                s = 0
                lower = tolower(path)
                if (lower ~ /\/app\/build\/outputs\/apk\/debug\/app-debug\.apk$/) s += 10000
                if (lower ~ /\/debug\//) s += 1000
                if (lower ~ /x86_64/) s += 500
                if (lower ~ /universal/) s += 300
                if (lower ~ /androidtest/) s -= 5000
                if (lower ~ /release/) s -= 2000
                if (lower ~ /unsigned/) s -= 500
                return s
              }
              { print score($0) "\t" $0 }
            ' | sort -nr | head -n 1 | cut -f2-)
          if [ -n "${CANDIDATE_AFTER}" ]; then
            mkdir -p "$(dirname "${EXPECTED_APK}")"
            cp "${CANDIDATE_AFTER}" "${EXPECTED_APK}"
            echo "✅ Normalized APK path after fallback build: ${CANDIDATE_AFTER} -> ${EXPECTED_APK}"
            exit 0
          fi

          echo "❌ Unable to find or produce APK for Detox."
          if [ -d "android/app/build/outputs/apk" ]; then
            echo "📁 APK output tree:"
            find android/app/build/outputs/apk -maxdepth 4 -type f | sort
          else
            echo "📁 APK output directory does not exist: android/app/build/outputs/apk"
          fi
          exit 1

      - name: Ensure Detox Android testBinaryPath
        run: |
          if [ ! -f "package.json" ]; then
            echo "ℹ️ package.json not found in working directory; skipping Detox config normalization."
            exit 0
          fi

          node - <<'NODE'
          const fs = require('node:fs');

          const pkgPath = 'package.json';
          const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
          const detoxConfig = pkg && pkg.detox;

          if (!detoxConfig || typeof detoxConfig !== 'object') {
            console.log('[detox-config] No detox config found; skipping.');
            process.exit(0);
          }

          const configurations = detoxConfig.configurations || {};
          const apps = detoxConfig.apps || {};
          const configuration = configurations['android.emu.debug'] || {};
          const appKey = configuration.app || 'android.debug';
          const appConfig = apps[appKey];

          if (!appConfig || appConfig.type !== 'android.apk') {
            console.log(`[detox-config] Android app config "${appKey}" not found; skipping.`);
            process.exit(0);
          }

          if (appConfig.testBinaryPath) {
            console.log(`[detox-config] testBinaryPath already set for "${appKey}".`);
            process.exit(0);
          }

          appConfig.testBinaryPath = 'android/app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk';
          fs.writeFileSync(pkgPath, `${JSON.stringify(pkg, null, 2)}\n`, 'utf8');
          console.log(`[detox-config] Added missing testBinaryPath to detox.apps.${appKey}.`);
          NODE

      - name: Run Detox tests on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          profile: pixel_5
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            cd ${{ inputs.working-directory }}
            ${{ inputs.detox-test-command }}
