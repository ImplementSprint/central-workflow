name: "Reusable: Mobile Maestro E2E"

on:
  workflow_call:
    inputs:
      working-directory:
        required: false
        type: string
        default: "."
        description: "Project directory"
      system-name:
        required: true
        type: string
        description: "System name for display"
      node-version:
        required: false
        type: number
        default: 24
        description: "Node.js version"
      java-version:
        required: false
        type: string
        default: "17"
        description: "JDK version"
      android-build-command:
        required: false
        type: string
        default: "cd android && ./gradlew :app:assembleDebug"
        description: "Command used to produce the Android app binary for Maestro"
      maestro-test-command:
        required: false
        type: string
        default: "maestro test .maestro"
        description: "Command used to execute Maestro tests"
      skip-build:
        required: false
        type: boolean
        default: false
        description: "Skip the app build step and use a pre-built artifact instead"
      build-artifact-name:
        required: false
        type: string
        default: ""
        description: "GitHub artifact name containing pre-built Android output (direct APK files)"

permissions:
  contents: read

jobs:
  maestro-e2e:
    name: "Maestro Android E2E"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: ./${{ inputs.working-directory }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Detect package manager
        id: detect-pm
        run: |
          if [ -f "yarn.lock" ]; then
            echo "pm=yarn" >> "$GITHUB_OUTPUT"
          elif [ -f "pnpm-lock.yaml" ]; then
            echo "pm=pnpm" >> "$GITHUB_OUTPUT"
          elif [ -f "package-lock.json" ] || [ -f "npm-shrinkwrap.json" ] || [ -f "package.json" ]; then
            echo "pm=npm" >> "$GITHUB_OUTPUT"
          else
            echo "❌ package.json is required for Maestro runs."
            exit 1
          fi

      - name: Setup Node.js ${{ inputs.node-version }} (npm)
        if: ${{ steps.detect-pm.outputs.pm == 'npm' }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}
          cache: "npm"
          cache-dependency-path: |
            **/package-lock.json

      - name: Setup Node.js ${{ inputs.node-version }} (yarn)
        if: ${{ steps.detect-pm.outputs.pm == 'yarn' }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}
          cache: "yarn"
          cache-dependency-path: |
            **/yarn.lock

      - name: Setup Node.js ${{ inputs.node-version }} (pnpm)
        if: ${{ steps.detect-pm.outputs.pm == 'pnpm' }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}
          cache: "pnpm"
          cache-dependency-path: |
            **/pnpm-lock.yaml

      - name: Install Dependencies
        env:
          PACKAGE_MANAGER: ${{ steps.detect-pm.outputs.pm }}
        run: |
          if [ "${PACKAGE_MANAGER}" = "yarn" ]; then
            corepack enable
            yarn install --frozen-lockfile
          elif [ "${PACKAGE_MANAGER}" = "pnpm" ]; then
            corepack enable
            pnpm install --frozen-lockfile
          else
            npm ci
          fi

      - name: Validate Maestro workspace
        run: |
          if [ ! -d ".maestro" ]; then
            echo "❌ Required .maestro directory was not found."
            echo "Create .maestro and add at least one flow file before enabling Maestro CI."
            exit 1
          fi

          MAESTRO_FLOW_FILES=()
          while IFS= read -r -d '' f; do
            MAESTRO_FLOW_FILES+=("$f")
          done < <(find .maestro -type f \( -name "*.yaml" -o -name "*.yml" \) -print0)

          if [ "${#MAESTRO_FLOW_FILES[@]}" -eq 0 ]; then
            echo "❌ No Maestro flow files were found under .maestro/."
            echo "Add at least one .yaml or .yml flow file before enabling Maestro CI."
            exit 1
          fi

          echo "✅ Found ${#MAESTRO_FLOW_FILES[@]} Maestro flow file(s)."

      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.maestro/bin:$PATH"
          maestro --version

      - name: Download pre-built Android artifact
        if: ${{ inputs.skip-build && inputs.build-artifact-name != '' }}
        uses: actions/download-artifact@v5
        with:
          name: ${{ inputs.build-artifact-name }}
          path: ${{ inputs.working-directory != '.' && format('{0}/{1}', github.workspace, inputs.working-directory) || github.workspace }}

      - name: Normalize restored APK path
        if: ${{ inputs.skip-build && inputs.build-artifact-name != '' }}
        run: |
          EXPECTED_APK="android/app/build/outputs/apk/debug/app-debug.apk"

          if [ -f "${EXPECTED_APK}" ]; then
            echo "✅ Expected APK exists: ${EXPECTED_APK}"
            exit 0
          fi

          CANDIDATE=$(find . -type f -name "app-debug.apk" | sort | head -n 1)
          if [ -z "${CANDIDATE}" ]; then
            CANDIDATE=$(find . -type f -name "*.apk" ! -name "*-androidTest.apk" | sort | head -n 1)
          fi

          if [ -n "${CANDIDATE}" ]; then
            mkdir -p "$(dirname "${EXPECTED_APK}")"
            cp "${CANDIDATE}" "${EXPECTED_APK}"
            echo "✅ Normalized APK path: ${CANDIDATE} -> ${EXPECTED_APK}"
          else
            echo "❌ No Android APK was found in the downloaded artifact payload."
            exit 1
          fi

      - name: Ensure Android Native Project
        if: ${{ !inputs.skip-build }}
        run: |
          if [ ! -d "android" ]; then
            CI=1 npx expo prebuild --platform android
          fi

      - name: Ensure Kotlin Version Fallback
        if: ${{ !inputs.skip-build }}
        run: |
          if [ -f "android/gradle.properties" ]; then
            if grep -q '^kotlinVersion=' android/gradle.properties; then
              CURRENT_VERSION=$(grep '^kotlinVersion=' android/gradle.properties | head -n 1 | cut -d'=' -f2-)
              echo "ℹ️ Preserving project kotlinVersion=${CURRENT_VERSION}"
            else
              echo 'kotlinVersion=2.0.21' >> android/gradle.properties
              echo "✅ Added fallback kotlinVersion=2.0.21"
            fi
          fi

      - name: Setup JDK ${{ inputs.java-version }}
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: ${{ inputs.java-version }}

      - name: Build Android app binary
        if: ${{ !inputs.skip-build }}
        run: ${{ inputs.android-build-command }}

      - name: Ensure Android app binary exists
        run: |
          EXPECTED_APK="android/app/build/outputs/apk/debug/app-debug.apk"

          if [ -f "${EXPECTED_APK}" ]; then
            echo "✅ Found app APK at expected path."
            exit 0
          fi

          CANDIDATE=$(find android/app/build/outputs/apk -type f -name "*.apk" ! -name "*-androidTest.apk" | sort | head -n 1)

          if [ -n "${CANDIDATE}" ]; then
            mkdir -p "$(dirname "${EXPECTED_APK}")"
            cp "${CANDIDATE}" "${EXPECTED_APK}"
            echo "✅ Normalized APK path for Maestro: ${CANDIDATE} -> ${EXPECTED_APK}"
            exit 0
          fi

          echo "ℹ️ APK candidate missing. Triggering fallback build command once..."
          ${{ inputs.android-build-command }}

          if [ -f "${EXPECTED_APK}" ]; then
            echo "✅ Fallback build produced expected APK."
            exit 0
          fi

          CANDIDATE_AFTER=$(find android/app/build/outputs/apk -type f -name "*.apk" ! -name "*-androidTest.apk" | sort | head -n 1)
          if [ -n "${CANDIDATE_AFTER}" ]; then
            mkdir -p "$(dirname "${EXPECTED_APK}")"
            cp "${CANDIDATE_AFTER}" "${EXPECTED_APK}"
            echo "✅ Normalized APK path for Maestro after fallback build."
            exit 0
          fi

          echo "❌ Unable to find or produce Android app APK for Maestro."
          if [ -d "android/app/build/outputs/apk" ]; then
            echo "📁 APK output tree:"
            find android/app/build/outputs/apk -maxdepth 4 -type f | sort
          else
            echo "📁 APK output directory does not exist: android/app/build/outputs/apk"
          fi
          exit 1

      - name: Reset ADB state before emulator startup
        run: |
          adb kill-server || true
          pkill -f "emulator" || true
          adb start-server || true

      - name: Run Maestro tests on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          profile: pixel_5
          force-avd-creation: true
          emulator-boot-timeout: 420
          emulator-options: -no-snapshot -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -wipe-data
          disable-animations: false
          script: |
            cd ${{ inputs.working-directory }}
            export PATH="$HOME/.maestro/bin:$PATH"

            echo "⏳ Waiting for Android emulator boot completion..."
            SERIAL="$(adb devices | awk 'NR>1 && $2=="device" {print $1; exit}')"
            if [ -z "${SERIAL}" ]; then
              SERIAL="$(adb devices | awk 'NR>1 && $1 ~ /^emulator-/ {print $1; exit}')"
            fi

            if [ -z "${SERIAL}" ]; then
              SERIAL="emulator-5554"
            fi

            echo "ℹ️ Using emulator serial: ${SERIAL}"
            adb -s "${SERIAL}" wait-for-device

            bash -lc 'SERIAL="$1"; RETRIES=0; MAX_RETRIES=180; OFFLINE_RESETS=0; MAX_OFFLINE_RESETS=3; until [ "$(adb -s "${SERIAL}" shell getprop sys.boot_completed 2>/dev/null | tr -d "\r")" = "1" ]; do RETRIES=$((RETRIES + 1)); STATE="$(adb devices | awk -v s="${SERIAL}" "\$1==s {print \$2}")"; if [ "${STATE}" = "offline" ]; then OFFLINE_RESETS=$((OFFLINE_RESETS + 1)); echo "⚠️ Emulator is offline (attempt ${OFFLINE_RESETS}/${MAX_OFFLINE_RESETS}); resetting adb"; adb kill-server || true; sleep 2; adb start-server || true; adb -s "${SERIAL}" wait-for-device || true; fi; if [ "${OFFLINE_RESETS}" -ge "${MAX_OFFLINE_RESETS}" ]; then echo "❌ Emulator stayed offline after ${MAX_OFFLINE_RESETS} adb resets."; adb devices -l || true; exit 1; fi; if [ "${RETRIES}" -ge "${MAX_RETRIES}" ]; then echo "❌ Emulator did not report sys.boot_completed=1 after ${MAX_RETRIES}s"; adb devices -l || true; adb -s "${SERIAL}" shell getprop | head -40 || true; exit 1; fi; sleep 1; done' _ "${SERIAL}"
            echo "✅ Emulator boot completed"

            APP_APK="android/app/build/outputs/apk/debug/app-debug.apk"
            if [ ! -f "${APP_APK}" ]; then
              APP_APK=$(find android/app/build/outputs/apk -type f -name "*.apk" ! -name "*-androidTest.apk" | sort | head -n 1)
            fi

            if [ -z "${APP_APK}" ] || [ ! -f "${APP_APK}" ]; then
              echo "❌ Could not resolve app APK path for Maestro execution."
              exit 1
            fi

            echo "📦 Installing APK: ${APP_APK}"
            adb install -r "${APP_APK}"

            export MAESTRO_DRIVER_STARTUP_TIMEOUT=180000
            MAESTRO_CMD="${{ inputs.maestro-test-command }}"

            echo "▶️ Running Maestro tests..."
            set +e
            bash -lc "${MAESTRO_CMD}" > maestro-run.log 2>&1
            MAESTRO_STATUS=$?
            set -e
            cat maestro-run.log
            exit "${MAESTRO_STATUS}"
