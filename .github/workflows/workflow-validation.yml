name: "Workflow Validation"

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - "templates/**"
      - "fixtures/consumer-callers/**"
      - "docs/**"
      - "MOBILE_PIPELINE_PRESETS_AND_PROMPT.md"
      - "USER_STORIES_STATUS.md"
  workflow_dispatch:
  # Added this block to allow the master pipeline to call this workflow
  workflow_call:
    inputs:
      systems-json:
        required: false
        type: string

permissions:
  contents: read

jobs:
  actionlint:
    name: "Actionlint"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Run actionlint
        uses: docker://rhysd/actionlint:1.7.12
        with:
          args: -color

  validate-workflow-contract-docs:
    name: "Validate Workflow Contract Docs"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Validate required workflow docs exist
        shell: bash
        run: |
          set -euo pipefail
          test -f docs/workflow-contract-registry.md
          test -f docs/release-reference-policy.md
          test -f docs/tribe-github-packages-onboarding.md
          test -f docs/central-workflow-improvement-decisions.md
          test -f docs/superpowers/plans/2026-05-18-central-workflow-safety-improvements.md
          test -f docs/superpowers/plans/2026-05-18-central-workflow-next-safety-phases.md
          test -f docs/consumer-fixture-validation.md
          test -f docs/v1-release-checklist.md
          test -f docs/workflow-permission-review.md

      - name: Validate central workflow refs
        shell: bash
        run: |
          set -euo pipefail
          if grep -RInE 'central-workflow/.+@(fix/e2e-policy|maestro)' templates docs .github/workflows; then
            echo "Found stale central-workflow branch refs."
            exit 1
          fi

      - name: Validate caller templates use main by default
        shell: bash
        run: |
          set -euo pipefail
          grep -RIn 'ImplementSprint/central-workflow/.github/workflows/.*@main' templates

      - name: Validate no literal package tokens are documented
        shell: bash
        run: |
          set -euo pipefail
          ghp_prefix='ghp''_'
          github_pat_prefix='github''_pat_'
          npm_token_pattern='npm_''[A-Za-z0-9]'
          if grep -RInE --exclude='workflow-validation.yml' --exclude-dir='superpowers' "$ghp_prefix|$github_pat_prefix|$npm_token_pattern" docs templates .github/workflows; then
            echo "Found a literal token-like value in repo docs/templates/workflows."
            exit 1
          fi

      - name: Validate GitHub Packages SDK guidance
        shell: bash
        run: |
          set -euo pipefail
          grep -RIn '@implementsprint:registry=https://npm.pkg.github.com' docs templates .github/workflows
          grep -RIn 'GITHUB_TOKEN' docs templates .github/workflows
          grep -RIn 'packages: read' .github/workflows

  validate-consumer-fixtures:
    name: "Validate Consumer Caller Fixtures"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Validate fixture copies match templates
        shell: bash
        run: |
          set -euo pipefail
          cmp templates/fe-pipeline-caller.yml fixtures/consumer-callers/frontend/.github/workflows/master-pipeline-fe.yml
          cmp templates/be-pipeline-caller.yml fixtures/consumer-callers/backend/.github/workflows/master-pipeline-be.yml
          cmp templates/mobile-pipeline-caller.yml fixtures/consumer-callers/mobile/.github/workflows/master-pipeline-mobile.yml
          cmp templates/mobile-kotlin-caller.yml fixtures/consumer-callers/kotlin/.github/workflows/mobile-kotlin-caller.yml

      - name: Validate fixture refs
        shell: bash
        run: |
          set -euo pipefail
          grep -RIn 'ImplementSprint/central-workflow/.github/workflows/.*@main' fixtures/consumer-callers
          if grep -RInE 'central-workflow/.+@(fix/e2e-policy|maestro)' fixtures/consumer-callers; then
            echo "Found stale central-workflow refs in consumer fixtures."
            exit 1
          fi

  validate-mobile-callers:
    name: "Validate Mobile Caller Templates"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Assert mobile caller template contract
        shell: bash
        run: |
          set -euo pipefail

          assert_contains() {
            local file="$1"
            local expected="$2"
            if ! grep -Fq "$expected" "$file"; then
              echo "❌ Expected '$expected' in $file"
              exit 1
            fi
          }

          CALLER="templates/mobile-pipeline-caller.yml"

          assert_contains "$CALLER" "uses: ImplementSprint/central-workflow/.github/workflows/master-pipeline-mobile.yml@main"
          assert_contains "$CALLER" "pipeline_mode"
          assert_contains "$CALLER" "enable_lint"
          assert_contains "$CALLER" "enable_security_scan"
          assert_contains "$CALLER" "enable_sonar"
          assert_contains "$CALLER" "enable_governance"
          assert_contains "$CALLER" "enable_grafana_k6"
          assert_contains "$CALLER" "k6_script_path"
          assert_contains "$CALLER" "k6_base_url"
          assert_contains "$CALLER" "k6_run_only_on_branch"

          echo "✅ Mobile caller template validated."

  validate-frontend-caller:
    name: "Validate Frontend Caller Template"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Assert frontend caller template contract
        shell: bash
        run: |
          set -euo pipefail

          assert_contains() {
            local file="$1"
            local expected="$2"
            if ! grep -Fq "$expected" "$file"; then
              echo "❌ Expected '$expected' in $file"
              exit 1
            fi
          }

          CALLER="templates/fe-pipeline-caller.yml"

          assert_contains "$CALLER" "uses: ImplementSprint/central-workflow/.github/workflows/master-pipeline-fe.yml@main"
          assert_contains "$CALLER" "pipeline_mode"
          assert_contains "$CALLER" "enable_playwright"
          assert_contains "$CALLER" "enable_grafana_k6"
          assert_contains "$CALLER" "k6_script_path"
          assert_contains "$CALLER" "run_deploy"
          assert_contains "$CALLER" "run_promotion"

          echo "✅ Frontend caller template validated."

  simulate-mobile-config-matrix:
    name: "Simulate Mobile Config Matrix"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Validate normalization + stack classification
        shell: bash
        run: |
          set -euo pipefail

          normalize_and_validate() {
            local input_json="$1"
            local normalized=""
            local type=""

            type=$(echo "$input_json" | jq -r 'type')
            if [ "$type" = "object" ]; then
              normalized=$(echo "$input_json" | jq -c '[.]')
            elif [ "$type" = "array" ]; then
              normalized=$(echo "$input_json" | jq -c .)
            else
              echo "❌ Config JSON must be object or array"
              exit 1
            fi

            echo "$normalized" | jq -e 'length > 0' >/dev/null
            echo "$normalized" | jq -e 'all(.[]; (.name|type=="string" and length>0) and (.dir|type=="string" and length>0) and (.mobile_stack|type=="string" and length>0))' >/dev/null
            echo "$normalized"
          }

          classify_target() {
            local system_json="$1"
            local stack_declared=""

            stack_declared=$(echo "$system_json" | jq -r '(.mobile_stack // .stack // .framework // "") | ascii_downcase | gsub("[ _]"; "-")')

            case "$stack_declared" in
              expo)
                echo "expo"
                ;;
              kotlin|android-kotlin|native-kotlin)
                echo "kotlin"
                ;;
              react-native|rn)
                echo "react-native"
                ;;
              *)
                echo "invalid"
                ;;
            esac
          }

          EXPO_SINGLE='{"name":"mobile-expo","dir":".","mobile_stack":"expo"}'
          KOTLIN_SINGLE='{"name":"mobile-kotlin","dir":".","mobile_stack":"kotlin"}'
          RN_SINGLE='{"name":"mobile-rn","dir":".","mobile_stack":"react-native"}'
          MIXED_MULTI='[{"name":"mobile-expo","dir":"apps/mobile-expo","mobile_stack":"expo"},{"name":"mobile-kotlin","dir":"apps/mobile-kotlin","mobile_stack":"kotlin"}]'
          INVALID_SINGLE='{"name":"mobile-invalid","dir":".","mobile_stack":"swift"}'

          EXPO_NORM=$(normalize_and_validate "$EXPO_SINGLE")
          KOTLIN_NORM=$(normalize_and_validate "$KOTLIN_SINGLE")
          RN_NORM=$(normalize_and_validate "$RN_SINGLE")
          MIXED_NORM=$(normalize_and_validate "$MIXED_MULTI")
          INVALID_NORM=$(normalize_and_validate "$INVALID_SINGLE")

          if [ "$(echo "$EXPO_NORM" | jq 'length')" -ne 1 ]; then
            echo "❌ Expo single normalization failed"
            exit 1
          fi

          if [ "$(echo "$KOTLIN_NORM" | jq 'length')" -ne 1 ]; then
            echo "❌ Kotlin single normalization failed"
            exit 1
          fi

          if [ "$(echo "$RN_NORM" | jq 'length')" -ne 1 ]; then
            echo "❌ React Native single normalization failed"
            exit 1
          fi

          if [ "$(echo "$MIXED_NORM" | jq 'length')" -lt 2 ]; then
            echo "❌ Mixed multi normalization failed"
            exit 1
          fi

          EXPO_CLASS=$(classify_target "$(echo "$EXPO_NORM" | jq -c '.[0]')")
          KOTLIN_CLASS=$(classify_target "$(echo "$KOTLIN_NORM" | jq -c '.[0]')")
          RN_CLASS=$(classify_target "$(echo "$RN_NORM" | jq -c '.[0]')")
          INVALID_CLASS=$(classify_target "$(echo "$INVALID_NORM" | jq -c '.[0]')")

          if [ "$EXPO_CLASS" != "expo" ]; then
            echo "❌ Expo sample classification expected expo, got $EXPO_CLASS"
            exit 1
          fi

          if [ "$KOTLIN_CLASS" != "kotlin" ]; then
            echo "❌ Kotlin sample classification expected kotlin, got $KOTLIN_CLASS"
            exit 1
          fi

          if [ "$RN_CLASS" != "react-native" ]; then
            echo "❌ React Native sample classification expected react-native, got $RN_CLASS"
            exit 1
          fi

          if [ "$INVALID_CLASS" != "invalid" ]; then
            echo "❌ Invalid sample classification expected invalid, got $INVALID_CLASS"
            exit 1
          fi

          echo "✅ Mobile config matrix simulation passed."

  validate-backend-caller:
    name: "Validate Backend Caller Template"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Assert backend caller template contract
        shell: bash
        run: |
          set -euo pipefail

          assert_contains() {
            local file="$1"
            local expected="$2"
            if ! grep -Fq "$expected" "$file"; then
              echo "❌ Expected '$expected' in $file"
              exit 1
            fi
          }

          CALLER="templates/be-pipeline-caller.yml"

          assert_contains "$CALLER" "uses: ImplementSprint/central-workflow/.github/workflows/master-pipeline-be.yml@main"
          assert_contains "$CALLER" "pipeline_mode"
          assert_contains "$CALLER" "enable_security_scan"
          assert_contains "$CALLER" "enable_sonar"
          assert_contains "$CALLER" "enable_k6"
          assert_contains "$CALLER" "k6_script_path"

          echo "✅ Backend caller template validated."

  simulate-backend-config-matrix:
    name: "Simulate Backend Config Matrix"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Validate backend normalization + stack classification
        shell: bash
        run: |
          set -euo pipefail

          normalize_and_validate() {
            local input_json="$1"
            local normalized=""
            local type=""

            type=$(echo "$input_json" | jq -r 'type')
            if [ "$type" = "object" ]; then
              normalized=$(echo "$input_json" | jq -c '[.]')
            elif [ "$type" = "array" ]; then
              normalized=$(echo "$input_json" | jq -c .)
            else
              echo "❌ Config JSON must be object or array"
              exit 1
            fi

            echo "$normalized" | jq -e 'length > 0' >/dev/null
            echo "$normalized" | jq -e 'all(.[]; (.name|type=="string" and length>0) and (.dir|type=="string" and length>0) and (.image|type=="string" and length>0))' >/dev/null
            echo "$normalized"
          }

          normalize_stack() {
            local system_json="$1"
            echo "$system_json" | jq -r '(.backend_stack // .stack // .framework // "nestjs") | ascii_downcase | gsub("[ _]"; "-")'
          }

          NEST_SINGLE='{"name":"backend-nest","dir":".","image":"ghcr.io/acme/backend-nest","backend_stack":"nestjs"}'
          NODE_SINGLE='{"name":"backend-node","dir":".","image":"ghcr.io/acme/backend-node","backend_stack":"nodejs"}'
          LEGACY_SINGLE='{"name":"backend-legacy","dir":".","image":"ghcr.io/acme/backend-legacy"}'
          ALIAS_SINGLE='{"name":"backend-alias","dir":".","image":"ghcr.io/acme/backend-alias","framework":"Node_JS"}'
          INVALID_SINGLE='{"name":"backend-invalid","dir":".","image":"ghcr.io/acme/backend-invalid","backend_stack":"go"}'

          NEST_NORM=$(normalize_and_validate "$NEST_SINGLE")
          NODE_NORM=$(normalize_and_validate "$NODE_SINGLE")
          LEGACY_NORM=$(normalize_and_validate "$LEGACY_SINGLE")
          ALIAS_NORM=$(normalize_and_validate "$ALIAS_SINGLE")
          INVALID_NORM=$(normalize_and_validate "$INVALID_SINGLE")

          NEST_STACK=$(normalize_stack "$(echo "$NEST_NORM" | jq -c '.[0]')")
          NODE_STACK=$(normalize_stack "$(echo "$NODE_NORM" | jq -c '.[0]')")
          LEGACY_STACK=$(normalize_stack "$(echo "$LEGACY_NORM" | jq -c '.[0]')")
          ALIAS_STACK=$(normalize_stack "$(echo "$ALIAS_NORM" | jq -c '.[0]')")
          INVALID_STACK=$(normalize_stack "$(echo "$INVALID_NORM" | jq -c '.[0]')")

          if [ "$NEST_STACK" != "nestjs" ]; then
            echo "❌ Nest sample classification expected nestjs, got $NEST_STACK"
            exit 1
          fi

          if [ "$NODE_STACK" != "nodejs" ]; then
            echo "❌ Node sample classification expected nodejs, got $NODE_STACK"
            exit 1
          fi

          if [ "$LEGACY_STACK" != "nestjs" ]; then
            echo "❌ Legacy sample default expected nestjs, got $LEGACY_STACK"
            exit 1
          fi

          if [ "$ALIAS_STACK" != "nodejs" ]; then
            echo "❌ Alias sample expected nodejs, got $ALIAS_STACK"
            exit 1
          fi

          if [ "$INVALID_STACK" = "nestjs" ] || [ "$INVALID_STACK" = "nodejs" ]; then
            echo "❌ Invalid sample should not classify as a supported backend stack"
            exit 1
          fi

          echo "✅ Backend config matrix simulation passed."
