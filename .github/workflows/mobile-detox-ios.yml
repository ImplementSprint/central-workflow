name: "Reusable: Mobile Detox iOS E2E"

on:
  workflow_call:
    inputs:
      working-directory:
        required: false
        type: string
        default: "."
        description: "Project directory"
      system-name:
        required: true
        type: string
        description: "System name for display"
      node-version:
        required: false
        type: number
        default: 20
        description: "Node.js version"
      detox-build-command:
        required: false
        type: string
        default: "npx detox build -c ios.sim.debug"
        description: "Command used to produce the iOS app binary for Detox"
      detox-test-command:
        required: false
        type: string
        default: "npx detox test -c ios.sim.debug --cleanup"
        description: "Command used to execute Detox iOS tests"
      skip-build:
        required: false
        type: boolean
        default: false
        description: "Skip the app build step and use a pre-built artifact instead"
      build-artifact-name:
        required: false
        type: string
        default: ""
        description: "GitHub artifact name containing pre-built iOS Detox output (.app.zip)"

permissions:
  contents: read

jobs:
  detox-ios-e2e:
    name: "Detox iOS E2E"
    runs-on: macos-15
    timeout-minutes: 60
    defaults:
      run:
        working-directory: ./${{ inputs.working-directory }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Detect package manager
        id: detect-pm
        run: |
          if [ -f "yarn.lock" ]; then
            echo "pm=yarn" >> "$GITHUB_OUTPUT"
          elif [ -f "pnpm-lock.yaml" ]; then
            echo "pm=pnpm" >> "$GITHUB_OUTPUT"
          elif [ -f "package-lock.json" ] || [ -f "npm-shrinkwrap.json" ] || [ -f "package.json" ]; then
            echo "pm=npm" >> "$GITHUB_OUTPUT"
          else
            echo "❌ package.json is required for Detox runs."
            exit 1
          fi

      - name: Setup Node.js ${{ inputs.node-version }} (npm)
        if: ${{ steps.detect-pm.outputs.pm == 'npm' }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: "npm"
          cache-dependency-path: |
            **/package-lock.json

      - name: Setup Node.js ${{ inputs.node-version }} (yarn)
        if: ${{ steps.detect-pm.outputs.pm == 'yarn' }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: "yarn"
          cache-dependency-path: |
            **/yarn.lock

      - name: Setup Node.js ${{ inputs.node-version }} (pnpm)
        if: ${{ steps.detect-pm.outputs.pm == 'pnpm' }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: "pnpm"
          cache-dependency-path: |
            **/pnpm-lock.yaml

      - name: Install Dependencies
        env:
          PACKAGE_MANAGER: ${{ steps.detect-pm.outputs.pm }}
        run: |
          if [ "${PACKAGE_MANAGER}" = "yarn" ]; then
            corepack enable
            yarn install --frozen-lockfile
          elif [ "${PACKAGE_MANAGER}" = "pnpm" ]; then
            corepack enable
            pnpm install --frozen-lockfile
          else
            npm ci
          fi

      - name: Select Xcode 26.2
        run: |
          sw_vers
          sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer
          xcodebuild -version

      - name: Install applesimutils
        run: |
          if command -v applesimutils >/dev/null 2>&1; then
            echo "✅ applesimutils already installed: $(applesimutils --version)"
            exit 0
          fi

          brew tap wix/brew
          brew install applesimutils
          echo "✅ Installed applesimutils: $(applesimutils --version)"

      - name: Validate Detox installation
        run: |
          if ! node -e "require.resolve('detox/package.json')" >/dev/null 2>&1; then
            echo "❌ Detox is not installed in this repository."
            echo "Add detox as a local devDependency in the target mobile repo before enabling Detox CI."
            exit 1
          fi

          DETOX_JEST_ENTRYPOINT=""
          for specifier in \
            "detox/runners/jest/testEnvironment" \
            "detox/runners/jest" \
            "detox/runners/jest-circus/environment" \
            "detox/runners/jest-circus"
          do
            if node -e "require.resolve(process.argv[1])" "${specifier}" >/dev/null 2>&1; then
              DETOX_JEST_ENTRYPOINT="${specifier}"
              break
            fi
          done

          if [ -z "${DETOX_JEST_ENTRYPOINT}" ]; then
            echo "⚠️ Jest cannot resolve a known Detox runner entrypoint from this repository."
            echo "Continuing because the repo may use a custom Jest environment file that imports Detox indirectly."
            echo "If Detox tests fail later, verify the repo's Detox/Jest configuration against the installed Detox version."
          else
            echo "✅ Resolved Detox Jest entrypoint: ${DETOX_JEST_ENTRYPOINT}"
          fi

          DETOX_INIT_FILES=()
          while IFS= read -r -d '' f; do
            DETOX_INIT_FILES+=("$f")
          done < <(find . -type f \( -path '*/e2e/init.js' -o -path '*/e2e/init.ts' -o -path '*/tests/e2e/init.js' -o -path '*/tests/e2e/init.ts' \) -print0)
          if [ "${#DETOX_INIT_FILES[@]}" -gt 0 ]; then
            JASMINE_INIT_FILES=()
            while IFS= read -r f; do
              [ -n "$f" ] && JASMINE_INIT_FILES+=("$f")
            done < <(grep -l 'jasmine\.getEnv()\|jasmine\.getEnv(' "${DETOX_INIT_FILES[@]}" 2>/dev/null || true)
            if [ "${#JASMINE_INIT_FILES[@]}" -gt 0 ]; then
              echo "❌ Detected legacy Jasmine-based Detox init setup that is incompatible with the installed Jest/Detox runner."
              printf '   - %s\n' "${JASMINE_INIT_FILES[@]}"
              echo "Remove jasmine.getEnv() reporter wiring from the Detox init file and migrate the repo to the current Detox Jest setup."
              echo "Typical fix: replace legacy init code that calls jasmine.getEnv().addReporter(...) with the current Detox setup used by the repo's installed Detox version."
              echo "This usually means keeping Detox lifecycle hooks (beforeAll/afterAll/etc.) but dropping Jasmine globals entirely."
              exit 1
            fi
          fi

      - name: Prepare Detox iOS framework cache
        run: |
          if npx detox --help 2>/dev/null | grep -q "build-framework-cache"; then
            npx detox clean-framework-cache || true
            npx detox build-framework-cache
          else
            echo "ℹ️ Installed Detox version does not expose framework-cache commands; continuing."
          fi

      - name: Download pre-built iOS artifact
        if: ${{ inputs.skip-build && inputs.build-artifact-name != '' }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.build-artifact-name }}
          path: ${{ inputs.working-directory != '.' && format('{0}/{1}', github.workspace, inputs.working-directory) || github.workspace }}

      - name: Extract pre-built iOS artifact
        if: ${{ inputs.skip-build && inputs.build-artifact-name != '' }}
        run: |
          ZIP_FILE=$(find . -maxdepth 1 -name "*.app.zip" -type f | head -n 1)
          if [ -n "${ZIP_FILE}" ]; then
            unzip -o "${ZIP_FILE}"
            rm -f "${ZIP_FILE}"
            echo "✅ Extracted pre-built iOS artifact."
          else
            echo "❌ No .app.zip found in downloaded artifact."
            exit 1
          fi

      - name: Normalize restored iOS app bundle path
        if: ${{ inputs.skip-build && inputs.build-artifact-name != '' }}
        run: |
          EXPECTED_APP="ios/build/Build/Products/Debug-iphonesimulator/DetoxApp.app"

          if [ -d "${EXPECTED_APP}" ]; then
            echo "✅ Expected iOS app bundle exists: ${EXPECTED_APP}"
            exit 0
          fi

          CANDIDATE_APP=$(find ios/build -type d -name "*.app" | sort | head -n 1)
          if [ -n "${CANDIDATE_APP}" ]; then
            mkdir -p "$(dirname "${EXPECTED_APP}")"
            rm -rf "${EXPECTED_APP}"
            cp -R "${CANDIDATE_APP}" "${EXPECTED_APP}"
            echo "✅ Normalized iOS app bundle path: ${CANDIDATE_APP} -> ${EXPECTED_APP}"
          else
            echo "⚠️ No iOS .app candidate found under ios/build"
          fi

      - name: Ensure iOS Native Project
        if: ${{ !inputs.skip-build }}
        run: |
          if [ ! -d "ios" ]; then
            CI=1 npx expo prebuild --platform ios
          fi

      - name: Install CocoaPods Dependencies
        if: ${{ !inputs.skip-build && hashFiles(format('{0}/ios/Podfile', inputs.working-directory)) != '' }}
        run: |
          if command -v npx >/dev/null 2>&1; then
            npx pod-install --project-directory=ios
          else
            cd ios
            pod install
            cd - >/dev/null
          fi

      - name: Resolve iOS scheme
        if: ${{ !inputs.skip-build }}
        id: ios-scheme
        run: |
          WORKSPACE_PATH=$(find ios -maxdepth 2 -type d -name "*.xcworkspace" ! -path "*/*.xcodeproj/*" | head -n 1)
          if [ -z "${WORKSPACE_PATH}" ]; then
            WORKSPACE_PATH=$(find ios -maxdepth 3 -type d -name "*.xcworkspace" ! -path "*/*.xcodeproj/*" | head -n 1)
          fi
          PROJECT_PATH=$(find ios -maxdepth 2 -name "*.xcodeproj" | head -n 1)

          if [ -n "${WORKSPACE_PATH}" ]; then
            LIST_JSON=$(xcodebuild -list -json -workspace "${WORKSPACE_PATH}")
            CONTAINER_FLAG="-workspace"
            CONTAINER_PATH="${WORKSPACE_PATH}"
          elif [ -n "${PROJECT_PATH}" ]; then
            LIST_JSON=$(xcodebuild -list -json -project "${PROJECT_PATH}")
            CONTAINER_FLAG="-project"
            CONTAINER_PATH="${PROJECT_PATH}"
          else
            echo "❌ No Xcode workspace/project found under ios/."
            exit 1
          fi

          AVAILABLE_SCHEMES=$(LIST_JSON="${LIST_JSON}" python3 -c "import json, os; data = json.loads(os.environ['LIST_JSON']); schemes = (data.get('workspace', {}).get('schemes') or []) + (data.get('project', {}).get('schemes') or []); seen = []; [seen.append(scheme) for scheme in schemes if scheme not in seen]; print('\\n'.join(seen))")

          echo "ℹ️ Available schemes:"
          printf '%s\n' "${AVAILABLE_SCHEMES}"

          SCHEME=$(CONTAINER_PATH="${CONTAINER_PATH}" AVAILABLE_SCHEMES="${AVAILABLE_SCHEMES}" python3 -c "import os, re; container_path = os.environ.get('CONTAINER_PATH', ''); schemes = [line.strip() for line in os.environ.get('AVAILABLE_SCHEMES', '').splitlines() if line.strip()]; container_name = os.path.splitext(os.path.basename(container_path))[0]; preferred_names = [container_name]; excluded = re.compile(r'^(Pods($|-)|.*Tests?$|.*UITests?$|.*UnitTests?$|.*IntegrationTests?$|.*SnapshotTests?$|.*tvOS.*|.*macOS.*)$', re.I); exact = next((scheme for preferred in preferred_names for scheme in schemes if not excluded.match(scheme) and scheme.lower() == preferred.lower()), None); contains = next((scheme for preferred in preferred_names for scheme in schemes if not excluded.match(scheme) and preferred and preferred.lower() in scheme.lower()), None); fallback = next((scheme for scheme in schemes if not excluded.match(scheme)), schemes[0] if schemes else ''); print(exact or contains or fallback)")

          if [ -z "${SCHEME}" ]; then
            echo "❌ Could not resolve an iOS scheme for build."
            exit 1
          fi

          echo "container_flag=${CONTAINER_FLAG}" >> "$GITHUB_OUTPUT"
          echo "container_path=${CONTAINER_PATH}" >> "$GITHUB_OUTPUT"
          echo "scheme=${SCHEME}" >> "$GITHUB_OUTPUT"
          echo "✅ Using iOS scheme: ${SCHEME}"

      - name: Build iOS app binary
        if: ${{ !inputs.skip-build }}
        env:
          CONTAINER_FLAG: ${{ steps.ios-scheme.outputs.container_flag }}
          CONTAINER_PATH: ${{ steps.ios-scheme.outputs.container_path }}
          SCHEME: ${{ steps.ios-scheme.outputs.scheme }}
          DETOX_IOS_BUILD_COMMAND: ${{ inputs.detox-build-command }}
        run: |
          DEFAULT_CMD='npx detox build -c ios.sim.debug'
          if [ "${DETOX_IOS_BUILD_COMMAND}" != "${DEFAULT_CMD}" ]; then
            echo "ℹ️ Running custom iOS app build command for Detox."
            eval "${DETOX_IOS_BUILD_COMMAND}"
            exit 0
          fi

          echo "ℹ️ Running explicit xcodebuild for the default Detox iOS simulator configuration."
          xcodebuild \
            ${CONTAINER_FLAG} "${CONTAINER_PATH}" \
            -scheme "${SCHEME}" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO \
            CLANG_WARN_NULLABILITY_COMPLETENESS=NO \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            clean build

      - name: Ensure iOS app bundle exists
        run: |
          EXPECTED_APP="ios/build/Build/Products/Debug-iphonesimulator/DetoxApp.app"

          if [ -d "${EXPECTED_APP}" ]; then
            echo "✅ Found iOS app bundle at expected path: ${EXPECTED_APP}"
            exit 0
          fi

          CANDIDATE_APP=$(find ios/build -type d -name "*.app" | sort | head -n 1)
          if [ -n "${CANDIDATE_APP}" ]; then
            mkdir -p "$(dirname "${EXPECTED_APP}")"
            rm -rf "${EXPECTED_APP}"
            cp -R "${CANDIDATE_APP}" "${EXPECTED_APP}"
            echo "✅ Normalized iOS app bundle path: ${CANDIDATE_APP} -> ${EXPECTED_APP}"
            exit 0
          fi

          echo "ℹ️ No iOS .app candidate found. Triggering fallback iOS build command once..."
          eval "${{ inputs.detox-build-command }}"

          if [ -d "${EXPECTED_APP}" ]; then
            echo "✅ Fallback build produced expected iOS app bundle: ${EXPECTED_APP}"
            exit 0
          fi

          CANDIDATE_AFTER=$(find ios/build -type d -name "*.app" | sort | head -n 1)
          if [ -n "${CANDIDATE_AFTER}" ]; then
            mkdir -p "$(dirname "${EXPECTED_APP}")"
            rm -rf "${EXPECTED_APP}"
            cp -R "${CANDIDATE_AFTER}" "${EXPECTED_APP}"
            echo "✅ Normalized iOS app bundle path after fallback build: ${CANDIDATE_AFTER} -> ${EXPECTED_APP}"
            exit 0
          fi

          echo "❌ Unable to find or produce iOS .app bundle for Detox."
          if [ -d "ios/build" ]; then
            echo "📁 iOS build tree:"
            find ios/build -maxdepth 6 -type d -name "*.app" | sort
          else
            echo "📁 iOS build directory does not exist: ios/build"
          fi
          exit 1

      - name: Run Detox iOS tests
        run: ${{ inputs.detox-test-command }}
