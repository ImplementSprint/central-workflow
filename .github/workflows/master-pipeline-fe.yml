  prepare-notify-prod-payload:
    name: "Prepare Notify Payload (MAIN)"
    needs: [active-systems, deploy-prod]
    if: >-
      always() &&
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call') &&
      fromJson(needs.active-systems.outputs.active_count) > 0 &&
      (needs.deploy-prod.result == 'success' || needs.deploy-prod.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      deployment_urls_json: ${{ steps.build.outputs.deployment_urls_json }}
    steps:
      - name: Build payload JSON
        id: build
        env:
          SYSTEMS_JSON: ${{ needs.active-systems.outputs.active_systems_json }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          RESPONSE=$(curl -sS -H "Authorization: Bearer ${VERCEL_TOKEN}" "https://api.vercel.com/v6/deployments?target=production&meta-githubCommitSha=${COMMIT_SHA}&limit=100")
          if ! echo "${RESPONSE}" | jq -e . >/dev/null 2>&1; then
            RESPONSE='{"deployments":[]}'
          fi

          DEPLOYMENT_URLS_JSON=$(echo "${SYSTEMS_JSON}" | jq -c --argjson data "${RESPONSE}" --arg runUrl "${RUN_URL}" '
            reduce .[] as $s ({};
              ($s.name // "") as $name |
              ($s.dir // "" | gsub("^\\./"; "") | split("/")[0]) as $dirKey |
              ($name | ascii_downcase) as $nameLower |
              ($dirKey | ascii_downcase) as $dirLower |
              .[$name] = (
                [ $data.deployments[]?
                  | select((.state // "") == "READY")
                  | {
                      n: ((.name // "") | ascii_downcase),
                      m: (((.meta.systemName // .meta.system // "") | tostring) | ascii_downcase),
                      u: (if (.url // "") == "" then "" else ("https://" + .url) end)
                    }
                  | select(.u != "")
                  | select(.m == $nameLower or .n == $nameLower or .n == $dirLower)
                  | .u
                ] | first // $runUrl
              )
            )
          ')

          echo "deployment_urls_json=${DEPLOYMENT_URLS_JSON}" >> "$GITHUB_OUTPUT"

  pipeline-summary:
    name: "Pipeline Summary"
    needs: [systems-config, frontend, sonarcloud, selenium-e2e, active-systems, grafana-k6-test-postdeploy, grafana-k6-uat-postdeploy, enforce-e2e-k6]
    if: always()
    uses: ./.github/workflows/pipeline-summary.yml
    with:
      pipeline-kind: ${{ needs.systems-config.outputs.pipeline_mode }}
      systems-json: ${{ needs.active-systems.outputs.active_systems_json }}
      results-json: '{}'
      overall-result: ${{ (needs.frontend.result == 'success' || needs.frontend.result == 'skipped') && (needs.sonarcloud.result == 'success' || needs.sonarcloud.result == 'skipped') && (needs.selenium-e2e.result == 'success' || needs.selenium-e2e.result == 'skipped') && ((github.ref_name == 'test' && (needs.grafana-k6-test-postdeploy.result == 'success' || needs.grafana-k6-test-postdeploy.result == 'skipped')) || (github.ref_name == 'uat' && (needs.grafana-k6-uat-postdeploy.result == 'success' || needs.grafana-k6-uat-postdeploy.result == 'skipped')) || (github.ref_name == 'main')) && needs.enforce-e2e-k6.result == 'success' && 'success' || (needs.frontend.result == 'cancelled' || needs.sonarcloud.result == 'cancelled' || needs.selenium-e2e.result == 'cancelled' || (github.ref_name == 'test' && needs.grafana-k6-test-postdeploy.result == 'cancelled') || (github.ref_name == 'uat' && needs.grafana-k6-uat-postdeploy.result == 'cancelled')) && 'cancelled' || 'failure' }}

  auto-revert-on-failure:
    name: "Auto Revert on Failure"
    permissions:
      contents: write
    needs:
      [
        systems-config,
        active-systems,
        frontend,
        sonarcloud,
        selenium-e2e,
        grafana-k6-test-postdeploy,
        grafana-k6-uat-postdeploy,
        enforce-e2e-k6,
        version-test,
        deploy-test,
        deploy-uat,
        production-gate,
        deploy-prod,
        update-about-link,
        version-main-release,
        docker-main,
        prepare-promotion-test-payload,
        prepare-promotion-uat-payload,
        create-pr-to-uat,
        create-pr-to-main,
        pipeline-summary,
      ]
    if: >-
      always() &&
      github.event_name == 'push' &&
      github.repository != 'ImplementSprint/CICD-Fe-Multi' && github.repository != 'ImplementSprint/central-workflow' &&
      (github.ref == 'refs/heads/uat' || github.ref == 'refs/heads/main') &&
      (
        (github.ref == 'refs/heads/uat' && (needs.deploy-uat.result == 'failure' || needs.production-gate.result == 'failure')) ||
        (github.ref == 'refs/heads/main' && (needs.deploy-prod.result == 'failure' || needs.update-about-link.result == 'failure' || needs.version-main-release.result == 'failure' || needs.docker-main.result == 'failure'))
      ) &&
      !contains(github.event.head_commit.message, '[skip-revert]') &&
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !contains(github.event.head_commit.message, '[ci skip]') &&
      !startsWith(github.event.head_commit.message, 'Revert "')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Cooldown before auto-revert
        run: sleep 45

      - name: Create rollback commit
        env:
          BRANCH_NAME: ${{ github.ref_name }}
          DEPLOY_UAT_RESULT: ${{ needs.deploy-uat.result }}
          PRODUCTION_GATE_RESULT: ${{ needs.production-gate.result }}
          DEPLOY_PROD_RESULT: ${{ needs.deploy-prod.result }}
          UPDATE_ABOUT_LINK_RESULT: ${{ needs.update-about-link.result }}
          VERSION_MAIN_RELEASE_RESULT: ${{ needs.version-main-release.result }}
          DOCKER_MAIN_RESULT: ${{ needs.docker-main.result }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin "${BRANCH_NAME}" --depth=50
          git checkout -B "${BRANCH_NAME}" "origin/${BRANCH_NAME}"

          export GIT_EDITOR=:

          if git revert --no-edit "${GITHUB_SHA}"; then
            git commit --amend -m "$(git log -1 --pretty=%B) [skip ci] [skip-revert]"
            echo "✅ Created revert commit from ${GITHUB_SHA}."
          elif git revert -m 1 --no-edit "${GITHUB_SHA}"; then
            git commit --amend -m "$(git log -1 --pretty=%B) [skip ci] [skip-revert]"
            echo "✅ Created merge-revert commit from ${GITHUB_SHA}."
          else
            git revert --abort || true
            SHORT_SHA="${GITHUB_SHA:0:7}"
            FAILED_JOBS=""
            [ "${DEPLOY_UAT_RESULT}" = "failure" ] && FAILED_JOBS="${FAILED_JOBS},deploy-uat"
            [ "${PRODUCTION_GATE_RESULT}" = "failure" ] && FAILED_JOBS="${FAILED_JOBS},production-gate"
            [ "${DEPLOY_PROD_RESULT}" = "failure" ] && FAILED_JOBS="${FAILED_JOBS},deploy-prod"
            [ "${UPDATE_ABOUT_LINK_RESULT}" = "failure" ] && FAILED_JOBS="${FAILED_JOBS},update-about-link"
            [ "${VERSION_MAIN_RELEASE_RESULT}" = "failure" ] && FAILED_JOBS="${FAILED_JOBS},version-main-release"
            [ "${DOCKER_MAIN_RESULT}" = "failure" ] && FAILED_JOBS="${FAILED_JOBS},docker-main"
            FAILED_JOBS="${FAILED_JOBS#,}"
            if [ -z "${FAILED_JOBS}" ]; then
              FAILED_JOBS="unknown"
            fi
            RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            git commit --allow-empty -m "ci(auto-revert): manual rollback required for ${SHORT_SHA} [skip ci] [skip-revert]" -m "failed_jobs=${FAILED_JOBS}" -m "run_url=${RUN_URL}"
            echo "⚠️ Automatic revert conflicted; created marker commit for manual rollback."
          fi

          git push origin "HEAD:${BRANCH_NAME}"

  notify-pipeline:
    name: "Notify Pipeline Status"
    needs: [systems-config, pipeline-summary, frontend, sonarcloud, selenium-e2e, grafana-k6-test-postdeploy, grafana-k6-uat-postdeploy, enforce-e2e-k6, active-systems, auto-revert-on-failure, prepare-promotion-test-payload, prepare-promotion-uat-payload, prepare-notify-prod-payload]
    if: always()
    uses: ./.github/workflows/notifications.yml
    with:
      status: ${{ (needs.frontend.result == 'success' || needs.frontend.result == 'skipped') && (needs.sonarcloud.result == 'success' || needs.sonarcloud.result == 'skipped') && (needs.selenium-e2e.result == 'success' || needs.selenium-e2e.result == 'skipped') && ((github.ref_name == 'test' && (needs.grafana-k6-test-postdeploy.result == 'success' || needs.grafana-k6-test-postdeploy.result == 'skipped')) || (github.ref_name == 'uat' && (needs.grafana-k6-uat-postdeploy.result == 'success' || needs.grafana-k6-uat-postdeploy.result == 'skipped')) || (github.ref_name == 'main')) && needs.enforce-e2e-k6.result == 'success' && 'success' || ((needs.frontend.result == 'cancelled' || needs.sonarcloud.result == 'cancelled' || needs.selenium-e2e.result == 'cancelled' || (github.ref_name == 'test' && needs.grafana-k6-test-postdeploy.result == 'cancelled') || (github.ref_name == 'uat' && needs.grafana-k6-uat-postdeploy.result == 'cancelled')) && 'cancelled' || 'failure') }}
      system-dir: ${{ needs.active-systems.outputs.active_label }}
      pipeline-type: ${{ needs.systems-config.outputs.pipeline_mode == 'single' && 'FE Single Master' || 'FE Multi Master' }}
      error-details: ${{ ((needs.frontend.result != 'success' && needs.frontend.result != 'skipped') || (needs.sonarcloud.result != 'success' && needs.sonarcloud.result != 'skipped') || (needs.selenium-e2e.result != 'success' && needs.selenium-e2e.result != 'skipped') || (github.ref_name == 'test' && (needs.grafana-k6-test-postdeploy.result != 'success' && needs.grafana-k6-test-postdeploy.result != 'skipped')) || (github.ref_name == 'uat' && (needs.grafana-k6-uat-postdeploy.result != 'success' && needs.grafana-k6-uat-postdeploy.result != 'skipped')) || needs.enforce-e2e-k6.result != 'success') && (needs.systems-config.outputs.pipeline_mode == 'single' && 'Master FE single pipeline reported failures.' || 'Master FE multi pipeline reported failures.') || '' }}
      deployment-url: ''
      deployment-urls-json: ${{ github.ref_name == 'main' && needs.prepare-notify-prod-payload.outputs.deployment_urls_json || (github.ref_name == 'uat' && needs.prepare-promotion-uat-payload.outputs.deployment_urls_json || (github.ref_name == 'test' && needs.prepare-promotion-test-payload.outputs.deployment_urls_json || '{}')) }}
      success-image-url: ${{ vars.DISCORD_SUCCESS_IMAGE_URL }}
      failure-image-url: ${{ vars.DISCORD_FAIL_IMAGE_URL }}
      cancelled-image-url: ${{ vars.DISCORD_CANCELLED_IMAGE_URL }}
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
