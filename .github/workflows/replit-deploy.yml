# ╔══════════════════════════════════════════════════════════════════╗
# ║  REUSABLE: Replit Deployment                                   ║
# ║  Dual mode: webhook trigger or health verification             ║
# ║                                                                ║
# ║  Optional repo secrets:                                       ║
# ║    REPLIT_DEPLOY_URL           — Replit deploy webhook URL      ║
# ║    REPLIT_HEALTHCHECK_URL_TEST — Test environment app URL/health║
# ║    REPLIT_HEALTHCHECK_URL_PROD — Prod environment app URL/health║
# ║    REPLIT_HEALTHCHECK_URL      — Fallback app URL/health        ║
# ║    REPLIT_API_KEY              — (optional) Replit API key      ║
# ╚══════════════════════════════════════════════════════════════════╝
name: "Reusable: Replit Deploy"

on:
  workflow_call:
    inputs:
      system-name:
        required: true
        type: string
        description: "System name for display"
      environment:
        required: true
        type: string
        description: "Deployment environment (test|uat|production)"
      branch:
        required: true
        type: string
        description: "Branch to deploy (test|uat|main)"
      deploy-mode:
        required: false
        type: string
        default: "auto"
        description: "auto|webhook|verify-only"
      healthcheck-url:
        required: false
        type: string
        default: ""
        description: "Optional direct Replit URL (base URL or full health endpoint)"
      healthcheck-path:
        required: false
        type: string
        default: "/api/v1/health"
        description: "Health path appended when healthcheck-url is a base URL"
      healthcheck-timeout-seconds:
        required: false
        type: number
        default: 0
        description: "Timeout for health polling; 0 uses env defaults"
      healthcheck-interval-seconds:
        required: false
        type: number
        default: 10
        description: "Health polling interval"
      healthcheck-expected-statuses:
        required: false
        type: string
        default: ""
        description: "Comma-separated accepted HTTP statuses"
    secrets:
      REPLIT_DEPLOY_URL:
        required: false
        description: "Replit deploy webhook URL"
      REPLIT_API_KEY:
        required: false
        description: "Replit API key"
      REPLIT_HEALTHCHECK_URL_TEST:
        required: false
        description: "Replit health URL for test environment"
      REPLIT_HEALTHCHECK_URL_PROD:
        required: false
        description: "Replit health URL for production environment"
      REPLIT_HEALTHCHECK_URL:
        required: false
        description: "Fallback Replit health URL"
    outputs:
      deployment_url:
        description: "Replit deployment URL"
        value: ${{ jobs.replit-deploy.outputs.deployment_url }}
      mode_used:
        description: "Execution mode used by Replit lane"
        value: ${{ jobs.replit-deploy.outputs.mode_used }}
      health_status:
        description: "Health verification status"
        value: ${{ jobs.replit-deploy.outputs.health_status }}
      healthcheck_url:
        description: "Resolved healthcheck URL"
        value: ${{ jobs.replit-deploy.outputs.healthcheck_url }}
      health_http_code:
        description: "Final health HTTP code"
        value: ${{ jobs.replit-deploy.outputs.health_http_code }}
      webhook_http_code:
        description: "Webhook HTTP code when webhook mode runs"
        value: ${{ jobs.replit-deploy.outputs.webhook_http_code }}

permissions:
  contents: read

concurrency:
  group: replit-deploy-${{ inputs.environment }}-${{ inputs.system-name }}
  cancel-in-progress: false

jobs:
  replit-deploy:
    name: "Deploy to Replit (${{ inputs.environment }})"
    runs-on: ubuntu-latest
    timeout-minutes: 40
    outputs:
      deployment_url: ${{ steps.summarize.outputs.deployment_url }}
      mode_used: ${{ steps.summarize.outputs.mode_used }}
      health_status: ${{ steps.summarize.outputs.health_status }}
      healthcheck_url: ${{ steps.summarize.outputs.healthcheck_url }}
      health_http_code: ${{ steps.summarize.outputs.health_http_code }}
      webhook_http_code: ${{ steps.summarize.outputs.webhook_http_code }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Resolve Replit mode and health defaults
        id: resolve
        env:
          DEPLOY_MODE: ${{ inputs.deploy-mode }}
          ENVIRONMENT: ${{ inputs.environment }}
          HEALTHCHECK_URL: ${{ inputs.healthcheck-url }}
          HEALTHCHECK_PATH: ${{ inputs.healthcheck-path }}
          HEALTHCHECK_TIMEOUT_SECONDS: ${{ inputs.healthcheck-timeout-seconds }}
          HEALTHCHECK_INTERVAL_SECONDS: ${{ inputs.healthcheck-interval-seconds }}
          HEALTHCHECK_EXPECTED_STATUSES: ${{ inputs.healthcheck-expected-statuses }}
          REPLIT_DEPLOY_URL: ${{ secrets.REPLIT_DEPLOY_URL }}
          REPLIT_HEALTHCHECK_URL_TEST: ${{ secrets.REPLIT_HEALTHCHECK_URL_TEST }}
          REPLIT_HEALTHCHECK_URL_PROD: ${{ secrets.REPLIT_HEALTHCHECK_URL_PROD }}
          REPLIT_HEALTHCHECK_URL: ${{ secrets.REPLIT_HEALTHCHECK_URL }}
        run: |
          set -euo pipefail

          MODE_RAW=$(echo "${DEPLOY_MODE}" | tr '[:upper:]' '[:lower:]')
          case "${MODE_RAW}" in
            auto|webhook|verify-only) ;;
            *)
              echo "❌ Invalid deploy-mode '${DEPLOY_MODE}'. Allowed: auto, webhook, verify-only"
              exit 1
              ;;
          esac

          MODE_USED="${MODE_RAW}"
          if [ "${MODE_USED}" = "auto" ]; then
            if [ -n "${REPLIT_DEPLOY_URL}" ]; then
              MODE_USED="webhook"
            else
              MODE_USED="verify-only"
            fi
          fi

          if [ "${ENVIRONMENT}" = "test" ]; then
            DEFAULT_EXPECTED="200,401,403"
            DEFAULT_TIMEOUT=180
          else
            DEFAULT_EXPECTED="200"
            DEFAULT_TIMEOUT=420
          fi

          EXPECTED_STATUSES="${HEALTHCHECK_EXPECTED_STATUSES}"
          if [ -z "${EXPECTED_STATUSES}" ]; then
            EXPECTED_STATUSES="${DEFAULT_EXPECTED}"
          fi

          TIMEOUT_SECONDS="${HEALTHCHECK_TIMEOUT_SECONDS}"
          if ! [[ "${TIMEOUT_SECONDS}" =~ ^[0-9]+$ ]] || [ "${TIMEOUT_SECONDS}" -le 0 ]; then
            TIMEOUT_SECONDS=${DEFAULT_TIMEOUT}
          fi

          INTERVAL_SECONDS="${HEALTHCHECK_INTERVAL_SECONDS}"
          if ! [[ "${INTERVAL_SECONDS}" =~ ^[0-9]+$ ]] || [ "${INTERVAL_SECONDS}" -le 0 ]; then
            INTERVAL_SECONDS=10
          fi

          HEALTH_SEED_URL=""
          if [ -n "${HEALTHCHECK_URL}" ]; then
            HEALTH_SEED_URL="${HEALTHCHECK_URL}"
          elif [ "${ENVIRONMENT}" = "test" ] && [ -n "${REPLIT_HEALTHCHECK_URL_TEST}" ]; then
            HEALTH_SEED_URL="${REPLIT_HEALTHCHECK_URL_TEST}"
          elif [ "${ENVIRONMENT}" = "production" ] && [ -n "${REPLIT_HEALTHCHECK_URL_PROD}" ]; then
            HEALTH_SEED_URL="${REPLIT_HEALTHCHECK_URL_PROD}"
          elif [ -n "${REPLIT_HEALTHCHECK_URL}" ]; then
            HEALTH_SEED_URL="${REPLIT_HEALTHCHECK_URL}"
          fi

          echo "mode_used=${MODE_USED}" >> "$GITHUB_OUTPUT"
          echo "health_seed_url=${HEALTH_SEED_URL}" >> "$GITHUB_OUTPUT"
          echo "expected_statuses=${EXPECTED_STATUSES}" >> "$GITHUB_OUTPUT"
          echo "timeout_seconds=${TIMEOUT_SECONDS}" >> "$GITHUB_OUTPUT"
          echo "interval_seconds=${INTERVAL_SECONDS}" >> "$GITHUB_OUTPUT"

      - name: Trigger Replit webhook deploy
        id: webhook
        if: ${{ steps.resolve.outputs.mode_used == 'webhook' }}
        env:
          REPLIT_DEPLOY_URL: ${{ secrets.REPLIT_DEPLOY_URL }}
          REPLIT_API_KEY: ${{ secrets.REPLIT_API_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${REPLIT_DEPLOY_URL}" ]; then
            echo "❌ deploy-mode=webhook requires REPLIT_DEPLOY_URL"
            exit 1
          fi

          if [ "${{ inputs.environment }}" = "production" ]; then
            PAYLOAD="{\"branch\":\"${{ inputs.branch }}\",\"commit\":\"${{ github.sha }}\",\"environment\":\"production\"}"
          else
            PAYLOAD="{\"branch\":\"${{ inputs.branch }}\",\"commit\":\"${{ github.sha }}\"}"
          fi

          SUCCESS=false
          HTTP_CODE="000"
          BODY=""

          for ATTEMPT in 1 2 3; do
            RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${REPLIT_DEPLOY_URL}" \
              -H "Content-Type: application/json" \
              -d "${PAYLOAD}" 2>&1 || true)

            HTTP_CODE=$(echo "${RESPONSE}" | tail -n 1)
            BODY=$(echo "${RESPONSE}" | sed '$d')

            if [ "${HTTP_CODE}" = "200" ] || [ "${HTTP_CODE}" = "201" ] || [ "${HTTP_CODE}" = "204" ]; then
              SUCCESS=true
              break
            fi

            if [ "${ATTEMPT}" -lt 3 ]; then
              echo "⚠️ Webhook attempt ${ATTEMPT} failed with HTTP ${HTTP_CODE}; retrying..."
              sleep 5
            fi
          done

          if [ "${SUCCESS}" != "true" ]; then
            echo "❌ Replit deploy webhook failed after retries. HTTP ${HTTP_CODE}"
            echo "Response body: ${BODY}"
            exit 1
          fi

          DEPLOY_URL=$(echo "${BODY}" | jq -r '.url // empty' 2>/dev/null || true)
          echo "deployment_url_candidate=${DEPLOY_URL}" >> "$GITHUB_OUTPUT"
          echo "webhook_http_code=${HTTP_CODE}" >> "$GITHUB_OUTPUT"

      - name: Resolve healthcheck URL
        id: health-url
        env:
          MODE_USED: ${{ steps.resolve.outputs.mode_used }}
          HEALTH_SEED_URL: ${{ steps.resolve.outputs.health_seed_url }}
          HEALTHCHECK_PATH: ${{ inputs.healthcheck-path }}
          WEBHOOK_DEPLOYMENT_URL: ${{ steps.webhook.outputs.deployment_url_candidate }}
        run: |
          set -euo pipefail

          HEALTH_URL="${HEALTH_SEED_URL}"
          if [ -n "${WEBHOOK_DEPLOYMENT_URL}" ]; then
            HEALTH_URL="${WEBHOOK_DEPLOYMENT_URL}"
          fi

          if [ -z "${HEALTH_URL}" ]; then
            echo "❌ No Replit health URL resolved. Set healthcheck-url input or REPLIT_HEALTHCHECK_URL_TEST/PROD secret."
            exit 1
          fi

          if echo "${HEALTH_URL}" | grep -Eq '^https?://[^/]+/?$'; then
            PATH_SUFFIX="${HEALTHCHECK_PATH}"
            if [ -z "${PATH_SUFFIX}" ]; then
              PATH_SUFFIX="/api/v1/health"
            fi
            if [[ "${PATH_SUFFIX}" != /* ]]; then
              PATH_SUFFIX="/${PATH_SUFFIX}"
            fi
            HEALTH_URL="${HEALTH_URL%/}${PATH_SUFFIX}"
          fi

          echo "healthcheck_url=${HEALTH_URL}" >> "$GITHUB_OUTPUT"

      - name: Verify Replit health
        id: verify
        env:
          HEALTHCHECK_URL: ${{ steps.health-url.outputs.healthcheck_url }}
          EXPECTED_STATUSES: ${{ steps.resolve.outputs.expected_statuses }}
          TIMEOUT_SECONDS: ${{ steps.resolve.outputs.timeout_seconds }}
          INTERVAL_SECONDS: ${{ steps.resolve.outputs.interval_seconds }}
        run: |
          set -euo pipefail

          IFS=',' read -r -a STATUS_CODES <<< "$(echo "${EXPECTED_STATUSES}" | tr -d ' ')"
          START_TIME=$(date +%s)
          LAST_HTTP_CODE="000"

          while true; do
            ATTEMPT_FILE=$(mktemp)
            LAST_HTTP_CODE=$(curl -sS -o "${ATTEMPT_FILE}" -w "%{http_code}" "${HEALTHCHECK_URL}" || echo "000")

            MATCHED=false
            for CODE in "${STATUS_CODES[@]}"; do
              if [ -n "${CODE}" ] && [ "${LAST_HTTP_CODE}" = "${CODE}" ]; then
                MATCHED=true
                break
              fi
            done

            if [ "${MATCHED}" = "true" ]; then
              echo "health_status=success" >> "$GITHUB_OUTPUT"
              echo "health_http_code=${LAST_HTTP_CODE}" >> "$GITHUB_OUTPUT"
              rm -f "${ATTEMPT_FILE}"
              exit 0
            fi

            NOW=$(date +%s)
            ELAPSED=$((NOW - START_TIME))
            if [ "${ELAPSED}" -ge "${TIMEOUT_SECONDS}" ]; then
              echo "health_status=failure" >> "$GITHUB_OUTPUT"
              echo "health_http_code=${LAST_HTTP_CODE}" >> "$GITHUB_OUTPUT"
              echo "❌ Replit health verification timed out at ${HEALTHCHECK_URL}"
              echo "Last HTTP status: ${LAST_HTTP_CODE}"
              echo "Response sample:"
              head -c 500 "${ATTEMPT_FILE}" || true
              rm -f "${ATTEMPT_FILE}"
              exit 1
            fi

            rm -f "${ATTEMPT_FILE}"
            sleep "${INTERVAL_SECONDS}"
          done

      - name: Summarize Replit lane
        id: summarize
        if: always()
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          MODE_USED: ${{ steps.resolve.outputs.mode_used }}
          RESOLVED_HEALTHCHECK_URL: ${{ steps.health-url.outputs.healthcheck_url }}
          HEALTH_STATUS: ${{ steps.verify.outputs.health_status }}
          HEALTH_HTTP_CODE: ${{ steps.verify.outputs.health_http_code }}
          WEBHOOK_HTTP_CODE: ${{ steps.webhook.outputs.webhook_http_code }}
          WEBHOOK_DEPLOYMENT_URL: ${{ steps.webhook.outputs.deployment_url_candidate }}
          EXPECTED_STATUSES: ${{ steps.resolve.outputs.expected_statuses }}
          TIMEOUT_SECONDS: ${{ steps.resolve.outputs.timeout_seconds }}
          INTERVAL_SECONDS: ${{ steps.resolve.outputs.interval_seconds }}
        run: |
          set -euo pipefail

          FINAL_DEPLOYMENT_URL="${WEBHOOK_DEPLOYMENT_URL}"
          if [ -z "${FINAL_DEPLOYMENT_URL}" ]; then
            FINAL_DEPLOYMENT_URL="${RESOLVED_HEALTHCHECK_URL}"
          fi
          if [ -z "${FINAL_DEPLOYMENT_URL}" ]; then
            FINAL_DEPLOYMENT_URL="${RUN_URL}"
          fi

          FINAL_HEALTH_STATUS="${HEALTH_STATUS}"
          if [ -z "${FINAL_HEALTH_STATUS}" ]; then
            FINAL_HEALTH_STATUS="unknown"
          fi

          FINAL_HEALTH_HTTP_CODE="${HEALTH_HTTP_CODE}"
          if [ -z "${FINAL_HEALTH_HTTP_CODE}" ]; then
            FINAL_HEALTH_HTTP_CODE="000"
          fi

          FINAL_WEBHOOK_HTTP_CODE="${WEBHOOK_HTTP_CODE}"
          if [ -z "${FINAL_WEBHOOK_HTTP_CODE}" ]; then
            FINAL_WEBHOOK_HTTP_CODE="n/a"
          fi

          echo "deployment_url=${FINAL_DEPLOYMENT_URL}" >> "$GITHUB_OUTPUT"
          echo "mode_used=${MODE_USED}" >> "$GITHUB_OUTPUT"
          echo "health_status=${FINAL_HEALTH_STATUS}" >> "$GITHUB_OUTPUT"
          echo "healthcheck_url=${RESOLVED_HEALTHCHECK_URL}" >> "$GITHUB_OUTPUT"
          echo "health_http_code=${FINAL_HEALTH_HTTP_CODE}" >> "$GITHUB_OUTPUT"
          echo "webhook_http_code=${FINAL_WEBHOOK_HTTP_CODE}" >> "$GITHUB_OUTPUT"

          echo "## Replit Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "- System: ${{ inputs.system-name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Environment: ${{ inputs.environment }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Branch: ${{ inputs.branch }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Mode: ${MODE_USED}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Health URL: ${RESOLVED_HEALTHCHECK_URL}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Health Status: ${FINAL_HEALTH_STATUS}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Health HTTP Code: ${FINAL_HEALTH_HTTP_CODE}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Webhook HTTP Code: ${FINAL_WEBHOOK_HTTP_CODE}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Expected Statuses: ${EXPECTED_STATUSES}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Poll Timeout: ${TIMEOUT_SECONDS}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- Poll Interval: ${INTERVAL_SECONDS}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- Deployment URL: [${FINAL_DEPLOYMENT_URL}](${FINAL_DEPLOYMENT_URL})" >> "$GITHUB_STEP_SUMMARY"
