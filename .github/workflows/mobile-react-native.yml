name: "React Native Mobile CI/CD Pipeline"

on:
  workflow_call:
    inputs:
      system-dir:
        required: false
        type: string
        default: "."
        description: "React Native project directory (e.g. app folder, or '.' for root)"
      system-name:
        required: true
        type: string
        description: "System name for artifacts/display"
      node-version:
        required: false
        type: number
        default: 24
        description: "Node.js version"
      java-version:
        required: false
        type: string
        default: "17"
        description: "JDK version for Android builds"
      android-build-command:
        required: false
        type: string
        default: "cd android && ./gradlew assembleDebug --no-daemon --stacktrace --warning-mode all"
        description: "Command used to produce the Android app binary"
      coverage-threshold:
        required: false
        type: number
        default: 80
        description: "Minimum code coverage percentage"
      enable-lint:
        required: false
        type: boolean
        default: true
        description: "Run lint checks"
      enable-security-scan:
        required: false
        type: boolean
        default: true
        description: "Run security scanning"
      enable-governance:
        required: false
        type: boolean
        default: true
        description: "Reserved for compatibility"
      enable-android-build:
        required: false
        type: boolean
        default: true
        description: "Run Android app build"
      enable-ios-build:
        required: false
        type: boolean
        default: true
        description: "Run iOS simulator app build"
      enable-maestro:
        required: false
        type: boolean
        default: true
        description: "Run Maestro Android E2E tests"
      enable-maestro-ios:
        required: false
        type: boolean
        default: true
        description: "Run Maestro iOS E2E tests"
      maestro-test-command:
        required: false
        type: string
        default: "maestro test .maestro"
        description: "Maestro Android test command"
      maestro-ios-test-command:
        required: false
        type: string
        default: "maestro test .maestro"
        description: "Maestro iOS test command"

permissions:
  contents: read

jobs:
  rn-typescript-standard:
    name: "React Native — TypeScript Standard"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ./${{ inputs.system-dir }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Validate React Native + TypeScript standard
        run: |
          if [ ! -f "package.json" ]; then
            echo "❌ package.json is required for React Native systems."
            exit 1
          fi

          if [ ! -f "tsconfig.json" ]; then
            echo "❌ tsconfig.json is required for React Native systems."
            exit 1
          fi

          if [ ! -d "android" ]; then
            echo "❌ android/ directory is required for React Native systems."
            exit 1
          fi

          if [ ! -d "ios" ]; then
            echo "❌ ios/ directory is required for React Native systems."
            exit 1
          fi

          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const deps = {
            ...(pkg.dependencies || {}),
            ...(pkg.devDependencies || {}),
            ...(pkg.peerDependencies || {}),
          };

          if (!deps['react-native']) {
            throw new Error('React Native standard requires dependency "react-native".');
          }

          if (!deps.typescript) {
            throw new Error('React Native standard requires dependency "typescript".');
          }

          const tsconfig = JSON.parse(fs.readFileSync('tsconfig.json', 'utf8'));
          if (!(tsconfig.compilerOptions && tsconfig.compilerOptions.strict === true)) {
            throw new Error('React Native standard requires tsconfig.compilerOptions.strict=true.');
          }

          const ignoreDirs = new Set(['node_modules', 'android', 'ios', '.git', 'dist', 'build', 'coverage']);
          const sourceDirs = ['app', 'src', 'components', 'screens', 'features', 'hooks', 'utils'];
          const jsLike = [];
          let hasTsSource = false;

          function walk(target) {
            const entries = fs.readdirSync(target, { withFileTypes: true });
            for (const entry of entries) {
              if (entry.name.startsWith('.')) {
                continue;
              }

              const fullPath = path.join(target, entry.name);
              if (entry.isDirectory()) {
                if (!ignoreDirs.has(entry.name)) {
                  walk(fullPath);
                }
                continue;
              }

              if (/\.(ts|tsx)$/i.test(entry.name)) {
                hasTsSource = true;
              }

              if (/\.(js|jsx)$/i.test(entry.name)) {
                jsLike.push(fullPath.replace(/\\/g, '/'));
              }
            }
          }

          for (const sourceDir of sourceDirs) {
            if (fs.existsSync(sourceDir) && fs.statSync(sourceDir).isDirectory()) {
              walk(sourceDir);
            }
          }

          for (const rootFile of ['App.ts', 'App.tsx']) {
            if (fs.existsSync(rootFile)) {
              hasTsSource = true;
            }
          }

          for (const rootFile of ['App.js', 'App.jsx']) {
            if (fs.existsSync(rootFile)) {
              jsLike.push(rootFile);
            }
          }

          if (!hasTsSource) {
            throw new Error('React Native standard requires TypeScript application source files (.ts/.tsx).');
          }

          if (jsLike.length > 0) {
            throw new Error('React Native standard forbids JS/JSX application source files. Found:\n' + jsLike.slice(0, 20).join('\n'));
          }
          NODE

  mobile-unit-tests:
    name: "Mobile — Jest Unit Tests"
    uses: ./.github/workflows/mobile-tests.yml
    with:
      working-directory: ${{ inputs.system-dir }}
      system-name: ${{ inputs.system-name }}
      node-version: ${{ inputs.node-version }}
      test-command: "npx jest --coverage --verbose --ci --forceExit --runInBand"
      coverage-threshold: ${{ inputs.coverage-threshold }}

  mobile-lint:
    name: "Mobile — Lint Check"
    if: ${{ inputs.enable-lint }}
    uses: ./.github/workflows/lint-check.yml
    with:
      working-directory: ${{ inputs.system-dir }}
      system-name: ${{ inputs.system-name }}
      node-version: ${{ inputs.node-version }}

  mobile-security:
    name: "Mobile — Security Scan"
    if: ${{ inputs.enable-security-scan }}
    uses: ./.github/workflows/security-scan.yml
    with:
      working-directory: ${{ inputs.system-dir }}
      system-name: ${{ inputs.system-name }}
      node-version: ${{ inputs.node-version }}
      fail-on-high: ${{ github.ref_name != 'test' && github.base_ref != 'test' }}

  android-build:
    name: "Android App Build (.apk)"
    needs: [rn-typescript-standard, mobile-unit-tests, mobile-lint, mobile-security]
    if: |
      always() &&
      inputs.enable-android-build &&
      !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: ./${{ inputs.system-dir }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Detect package manager
        id: detect-pm
        run: |
          if [ -f "yarn.lock" ]; then
            echo "pm=yarn" >> "$GITHUB_OUTPUT"
          elif [ -f "pnpm-lock.yaml" ]; then
            echo "pm=pnpm" >> "$GITHUB_OUTPUT"
          elif [ -f "package-lock.json" ] || [ -f "npm-shrinkwrap.json" ] || [ -f "package.json" ]; then
            echo "pm=npm" >> "$GITHUB_OUTPUT"
          else
            echo "❌ package.json is required."
            exit 1
          fi

      - name: Setup Node.js ${{ inputs.node-version }} (npm)
        if: ${{ steps.detect-pm.outputs.pm == 'npm' }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}
          cache: "npm"
          cache-dependency-path: |
            **/package-lock.json

      - name: Setup Node.js ${{ inputs.node-version }} (yarn)
        if: ${{ steps.detect-pm.outputs.pm == 'yarn' }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}
          cache: "yarn"
          cache-dependency-path: |
            **/yarn.lock

      - name: Setup Node.js ${{ inputs.node-version }} (pnpm)
        if: ${{ steps.detect-pm.outputs.pm == 'pnpm' }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}
          cache: "pnpm"
          cache-dependency-path: |
            **/pnpm-lock.yaml

      - name: Install Dependencies
        env:
          PACKAGE_MANAGER: ${{ steps.detect-pm.outputs.pm }}
        run: |
          if [ "${PACKAGE_MANAGER}" = "yarn" ]; then
            corepack enable
            yarn install --frozen-lockfile --ignore-scripts
          elif [ "${PACKAGE_MANAGER}" = "pnpm" ]; then
            corepack enable
            pnpm install --frozen-lockfile --ignore-scripts
          else
            npm ci --ignore-scripts
          fi

      - name: Verify Android native project exists
        run: |
          if [ ! -d "android" ]; then
            echo "❌ React Native Android build requires android/ directory in the project."
            exit 1
          fi

      - name: Normalize React Native New Architecture API
        run: |
          MAIN_APP_FILES=()
          while IFS= read -r -d '' f; do
            MAIN_APP_FILES+=("$f")
          done < <(find . -type f -path '*/android/app/src/main/java/*/MainApplication.java' -print0)

          if [ "${#MAIN_APP_FILES[@]}" -eq 0 ]; then
            echo "ℹ️ No MainApplication.java files found to normalize."
            exit 0
          fi

          for MAIN_APP in "${MAIN_APP_FILES[@]}"; do
            if grep -q 'DefaultNewArchitectureEntryPoint\.releaseLevel' "${MAIN_APP}"; then
              perl -0pi -e 's/DefaultNewArchitectureEntryPoint\.releaseLevel\s*=\s*([^;]+);/DefaultNewArchitectureEntryPoint.setReleaseLevel($1);/g' "${MAIN_APP}"
              echo "✅ Normalized releaseLevel API usage in ${MAIN_APP}"
            else
              echo "ℹ️ ${MAIN_APP} already uses compatible release level API."
            fi
          done

      - name: Force React Native debug JS bundling for CI
        run: |
          BUILD_GRADLE="android/app/build.gradle"

          if [ ! -f "${BUILD_GRADLE}" ]; then
            echo "ℹ️ No ${BUILD_GRADLE} file found to patch."
            exit 0
          fi

          if grep -Fq 'debuggableVariants = []' "${BUILD_GRADLE}"; then
            echo "ℹ️ Debug JS bundling is already forced in ${BUILD_GRADLE}."
            exit 0
          fi

          python3 <<'PY'
          from pathlib import Path

          build_gradle_path = Path("android/app/build.gradle")
          content = build_gradle_path.read_text(encoding="utf-8")
          needle = "react {\n"
          replacement = (
              "react {\n"
              "    // Force JS bundling in debug builds for CI mobile E2E runs.\n"
              "    debuggableVariants = []\n"
          )

          if needle not in content:
              raise SystemExit(f"❌ Unable to find a react {{ block in {build_gradle_path}.")

          build_gradle_path.write_text(content.replace(needle, replacement, 1), encoding="utf-8")
          print(f"✅ Forced debug JS bundling in {build_gradle_path}.")
          PY

      - name: Ensure Kotlin Version Fallback
        run: |
          if [ -f "android/gradle.properties" ]; then
            if grep -q '^kotlinVersion=' android/gradle.properties; then
              CURRENT_VERSION=$(grep '^kotlinVersion=' android/gradle.properties | head -n 1 | cut -d'=' -f2-)
              echo "ℹ️ Preserving project kotlinVersion=${CURRENT_VERSION}"
            else
              echo 'kotlinVersion=2.0.21' >> android/gradle.properties
              echo "✅ Added fallback kotlinVersion=2.0.21"
            fi
          fi

      - name: Setup JDK ${{ inputs.java-version }}
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: ${{ inputs.java-version }}

      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is executable
        run: |
          if [ -f "android/gradlew" ]; then
            chmod +x android/gradlew
          fi

      - name: Build Android app binary
        run: ${{ inputs.android-build-command }}

      - name: Normalize Android APK path for Maestro
        run: |
          EXPECTED_APK="android/app/build/outputs/apk/debug/app-debug.apk"

          if [ -f "${EXPECTED_APK}" ]; then
            echo "✅ Android APK already present at expected path: ${EXPECTED_APK}"
            exit 0
          fi

          CANDIDATE_APK=$(find android/app/build/outputs/apk -type f -name "*.apk" ! -name "*-androidTest.apk" | sort | head -n 1)
          if [ -n "${CANDIDATE_APK}" ]; then
            mkdir -p "$(dirname "${EXPECTED_APK}")"
            cp "${CANDIDATE_APK}" "${EXPECTED_APK}"
            echo "✅ Normalized Android APK path: ${CANDIDATE_APK} -> ${EXPECTED_APK}"
          else
            echo "❌ No Android APK was produced after build."
            exit 1
          fi

      - name: Archive Android build outputs
        id: archive-android
        run: |
          EXPECTED_APK="android/app/build/outputs/apk/debug/app-debug.apk"
          if [ ! -f "${EXPECTED_APK}" ]; then
            echo "❌ Android APK not found at ${EXPECTED_APK} after build."
            exit 1
          fi

          ARTIFACT_DIR="android-maestro-build-artifact"
          mkdir -p "${ARTIFACT_DIR}/android/app/build/outputs/apk/debug"
          cp "${EXPECTED_APK}" "${ARTIFACT_DIR}/android/app/build/outputs/apk/debug/app-debug.apk"

          echo "artifact_path=${PWD}/${ARTIFACT_DIR}" >> "$GITHUB_OUTPUT"
          echo "✅ Android app APK ready for upload."

      - name: Upload Android build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.system-name }}-android-build
          path: ${{ steps.archive-android.outputs.artifact_path }}
          retention-days: 14

  ios-build:
    name: "iOS Simulator App Build (.app)"
    needs: [rn-typescript-standard, mobile-unit-tests, mobile-lint, mobile-security]
    if: |
      always() &&
      inputs.enable-ios-build &&
      !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    uses: ./.github/workflows/mobile-ios-build.yml
    with:
      working-directory: ${{ inputs.system-dir }}
      system-name: ${{ inputs.system-name }}
      node-version: ${{ inputs.node-version }}
      upload-artifact: true

  mobile-maestro:
    name: "Maestro Android E2E"
    needs: [rn-typescript-standard, mobile-unit-tests, mobile-lint, mobile-security, android-build]
    if: |
      always() &&
      inputs.enable-maestro &&
      needs.android-build.result == 'success' &&
      !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    uses: ./.github/workflows/mobile-maestro.yml
    with:
      working-directory: ${{ inputs.system-dir }}
      system-name: ${{ inputs.system-name }}
      node-version: ${{ inputs.node-version }}
      java-version: ${{ inputs.java-version }}
      maestro-test-command: ${{ inputs.maestro-test-command }}
      skip-build: true
      build-artifact-name: ${{ format('{0}-android-build', inputs.system-name) }}

  mobile-maestro-ios:
    name: "Maestro iOS E2E"
    needs: [rn-typescript-standard, mobile-unit-tests, mobile-lint, mobile-security, ios-build]
    if: |
      always() &&
      inputs.enable-maestro-ios &&
      needs.ios-build.result == 'success' &&
      !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    uses: ./.github/workflows/mobile-maestro-ios.yml
    with:
      working-directory: ${{ inputs.system-dir }}
      system-name: ${{ inputs.system-name }}
      node-version: ${{ inputs.node-version }}
      maestro-test-command: ${{ inputs.maestro-ios-test-command }}
      skip-build: true
      build-artifact-name: ${{ format('{0}-ios-simulator-build', inputs.system-name) }}
