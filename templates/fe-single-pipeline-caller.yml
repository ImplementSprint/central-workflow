# Template: FE Single Pipeline Caller (for other repositories)
# Copy this file to: .github/workflows/master-pipeline-fe-single.yml in the target repo.
#
# IMPORTANT:
# - Update the `uses` repository/ref below to point to your central pipeline repo.
# - Keep all CI/CD logic inside the called master orchestrator workflow.

name: "Master Pipeline Caller — FE Single"

on:
  push:
    branches: [test, uat, main]
  pull_request:
    branches: [test, uat, main]
  workflow_dispatch:
    inputs:
      enable_selenium:
        description: "Run Selenium E2E checks"
        type: boolean
        default: false
      selenium_mode:
        description: "Selenium execution mode (local|grid)"
        type: string
        default: "local"
      selenium_browsers:
        description: "Selenium browser list (JSON array or CSV)"
        type: string
        default: '["chrome"]'
      selenium_grid_url:
        description: "Selenium Grid URL (required when selenium_mode=grid)"
        type: string
        default: ""
      selenium_run_only_on_branch:
        description: "Branch allowed for Selenium execution"
        type: string
        default: "test"
      enable_grafana_k6:
        description: "Run Grafana k6 cloud checks"
        type: boolean
        default: false
      k6_script_path:
        description: "Path to k6 script"
        type: string
        default: "tests/performance/k6-smoke.js"
      k6_base_url:
        description: "Optional base URL for k6"
        type: string
        default: ""
      k6_run_only_on_branch:
        description: "Branch allowed for k6 execution"
        type: string
        default: "uat"
      run_deploy:
        description: "Run deploy jobs"
        type: boolean
        default: true
      run_promotion:
        description: "Run PR promotion jobs"
        type: boolean
        default: true
      dry_run:
        description: "Preview-only mode (skip deploy/tag push, print PR body)"
        type: boolean
        default: false

permissions:
  contents: write
  packages: write
  pull-requests: write
  security-events: write

concurrency:
  group: master-pipeline-fe-single-caller-${{ github.ref }}
  cancel-in-progress: true

jobs:
  master-orchestrator:
    if: ${{ github.event.repository.name != 'central-workflow' }}
    name: "Call Unified Master Orchestrator"
    uses: ImplementSprint/central-workflow/.github/workflows/master-pipeline-fe.yml@main
    with:
      pipeline_mode: single
      enable_selenium: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.enable_selenium == 'true' }}
      selenium_mode: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.selenium_mode || 'local' }}
      selenium_browsers: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.selenium_browsers || '["chrome"]' }}
      selenium_grid_url: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.selenium_grid_url || '' }}
      selenium_run_only_on_branch: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.selenium_run_only_on_branch || 'test' }}
      enable_grafana_k6: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.enable_grafana_k6 == 'true' }}
      k6_script_path: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.k6_script_path || 'tests/performance/k6-smoke.js' }}
      k6_base_url: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.k6_base_url || '' }}
      k6_run_only_on_branch: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.k6_run_only_on_branch || 'uat' }}
      run_deploy: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.run_deploy == 'true' }}
      run_promotion: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.run_promotion == 'true' }}
      dry_run: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true' }}
    secrets: inherit
