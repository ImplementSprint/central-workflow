# ──────────────────────────────────────────────────────────────
# FE Pipeline Caller (unified)
# Copy this file into the target repo at:
#   .github/workflows/master-pipeline-fe.yml
#
# Works for both single-system and multi-system FE repositories.
# The pipeline_mode input controls which SYSTEMS_JSON variable
# is read (auto = picks multi if available, else single).
# ──────────────────────────────────────────────────────────────
name: "Master Pipeline — FE"

on:
  push:
    branches: [test, uat, main]
  pull_request:
    branches: [test, uat, main]
  workflow_dispatch:
    inputs:
      pipeline_mode:
        description: "Pipeline mode (auto|single|multi)"
        type: choice
        options: [auto, single, multi]
        default: auto
      enable_selenium:
        description: "Run Selenium E2E checks"
        type: boolean
        default: true
      selenium_browsers:
        description: "Selenium browser list (JSON array or CSV)"
        type: string
        default: '["chrome"]'
      e2e_base_url:
        description: "Optional base URL for Selenium E2E"
        type: string
        default: ""
      selenium_run_only_on_branch:
        description: "Branch allowed for Selenium execution"
        type: string
        default: "test,uat"
      enable_grafana_k6:
        description: "Run Grafana k6 cloud checks"
        type: boolean
        default: true
      k6_script_path:
        description: "Path to k6 script"
        type: string
        default: "tests/performance/k6-smoke.js"
      k6_base_url:
        description: "Optional base URL for k6"
        type: string
        default: ""
      k6_run_only_on_branch:
        description: "Branch allowed for k6 execution"
        type: string
        default: "test,uat"
      run_deploy:
        description: "Run deploy jobs"
        type: boolean
        default: true
      run_promotion:
        description: "Run PR promotion jobs"
        type: boolean
        default: true
      dry_run:
        description: "Preview-only mode (skip deploy/tag push, print PR body)"
        type: boolean
        default: false

concurrency:
  group: master-pipeline-fe-${{ github.ref }}
  cancel-in-progress: true

jobs:
  call-orchestrator-default:
    if: ${{ github.event_name != 'workflow_dispatch' }}
    uses: ImplementSprint/central-workflow/.github/workflows/master-pipeline-fe.yml@main
    secrets: inherit

  call-orchestrator-dispatch:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    uses: ImplementSprint/central-workflow/.github/workflows/master-pipeline-fe.yml@main
    with:
      pipeline_mode: ${{ inputs.pipeline_mode }}
      enable_selenium: ${{ inputs.enable_selenium }}
      selenium_browsers: ${{ inputs.selenium_browsers }}
      e2e_base_url: ${{ inputs.e2e_base_url }}
      selenium_run_only_on_branch: ${{ inputs.selenium_run_only_on_branch }}
      enable_grafana_k6: ${{ inputs.enable_grafana_k6 }}
      k6_script_path: ${{ inputs.k6_script_path }}
      k6_base_url: ${{ inputs.k6_base_url }}
      k6_run_only_on_branch: ${{ inputs.k6_run_only_on_branch }}
      run_deploy: ${{ inputs.run_deploy }}
      run_promotion: ${{ inputs.run_promotion }}
      dry_run: ${{ inputs.dry_run }}
    secrets: inherit
