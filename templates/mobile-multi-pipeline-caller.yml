# Template: Mobile Multi Pipeline Caller (for other repositories)
# Copy this file to: .github/workflows/master-pipeline-mobile-multi.yml in the target repo.
#
# IMPORTANT:
# - Update the `uses` repository/ref below to point to your central pipeline repo.
# - Keep all CI/CD logic inside the called master orchestrator workflow.

name: "Master Pipeline Caller — Mobile Multi"

on:
  push:
    branches: [test, uat, main]
  pull_request:
    branches: [test, uat, main]
  workflow_dispatch:
    inputs:
      enable_grafana_k6:
        description: "Run Grafana k6 cloud checks"
        type: boolean
        default: true
      k6_script_path:
        description: "Path to k6 script"
        type: string
        default: "tests/performance/k6-smoke.js"
      k6_base_url:
        description: "Optional base URL for k6"
        type: string
        default: ""
      k6_run_only_on_branch:
        description: "Branch allowed for k6 execution"
        type: string
        default: "test,uat,main"
      run_deploy:
        description: "Run deploy jobs"
        type: boolean
        default: true
      run_promotion:
        description: "Run PR promotion jobs"
        type: boolean
        default: true
      dry_run:
        description: "Preview-only mode (skip version tag push)"
        type: boolean
        default: false

permissions:
  contents: write
  packages: write
  pull-requests: write
  security-events: write

concurrency:
  group: master-pipeline-mobile-multi-caller-${{ github.ref }}
  cancel-in-progress: true

jobs:
  master-orchestrator:
    if: ${{ github.event.repository.name != 'central-workflow' }}
    name: "Call Mobile Master Orchestrator"
    uses: ImplementSprint/central-workflow/.github/workflows/master-pipeline-mobile.yml@main
    with:
      pipeline_mode: multi
      enable_grafana_k6: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.enable_grafana_k6 == 'true' }}
      k6_script_path: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.k6_script_path || 'tests/performance/k6-smoke.js' }}
      k6_base_url: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.k6_base_url || '' }}
      k6_run_only_on_branch: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.k6_run_only_on_branch || 'test,uat,main' }}
      run_deploy: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.run_deploy == 'true' }}
      run_promotion: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.run_promotion == 'true' }}
      dry_run: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true' }}
    secrets: inherit
